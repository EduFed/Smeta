<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СМЕТА — расчёт ремонтных работ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --paper-line:#D9D2BE;
    --ink:#1E2A32;
    --ink-soft:#5B6B74;
    --blue:#2C5F7C;
    --blue-soft:#DDE7EA;
    --orange:#E8622C;
    --orange-soft:#FBE4D8;
    --green:#4A7C59;
    --red:#B33A2E;
    --white:#FFFDF9;
    --radius:2px;
  }
  /* ТЁМНАЯ ТЕМА (переключается автоматически по времени устройства) */
  [data-theme="dark"]{
    --paper:#12171A;
    --paper-line:#2A343B;
    --ink:#E6EAED;
    --ink-soft:#93A0A8;
    --blue:#5A9BC0;
    --blue-soft:#1C2E39;
    --orange:#F0743E;
    --orange-soft:#33241C;
    --green:#5E9A6E;
    --red:#D2554A;
    --white:#1B2228;
  }
  [data-theme="dark"] .sidebar{ background:#161D22; color:#EAEEF0; }
  [data-theme="dark"] .btn-ghost{ color:#EAEEF0; border-color:#3D4B53; }
  [data-theme="dark"] .btn-primary{ color:#fff; }
  [data-theme="dark"] .proj-item.active{ color:#fff; }
  [data-theme="dark"] .nav-toggle{ background:#222E35; color:#fff; }
  [data-theme="dark"] .smeta-total{ background:#161D22; color:#fff; }
  [data-theme="dark"] .auth-overlay{ background:#12171A; }
  [data-theme="dark"] .smeta-wrap, [data-theme="dark"] .catalog-table{ border-color:#2A343B; }
  @media print{
    [data-theme="dark"]{ --paper:#fff; --white:#fff; --ink:#1E2A32; --ink-soft:#5B6B74; --paper-line:#D9D2BE; --blue-soft:#DDE7EA; }
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    min-height:100vh;
  }
  /* SIDEBAR */
  .sidebar{
    background:var(--ink);
    color:var(--white);
    padding:24px 20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    position:fixed; top:0; left:0;
    width:280px; height:100vh;
    box-sizing:border-box;
    overflow-y:auto;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:1000;
  }
  body.nav-open .sidebar{ transform:translateX(0); }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
    display:flex;
    align-items:baseline;
    gap:8px;
    padding-left:36px;
  }
  .brand span{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--orange);
    font-weight:500;
  }
  .sb-section{display:flex;flex-direction:column;gap:8px;}
  .sb-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:#8FA0A8;
    margin-bottom:2px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    border:none;
    border-radius:var(--radius);
    padding:9px 14px;
    cursor:pointer;
    transition:transform .08s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--orange);color:var(--white);}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--white);border:1px solid #3D4B53;}
  .btn-ghost:hover{border-color:var(--orange);}
  .btn-outline{background:transparent;color:var(--ink);border:1px solid var(--ink);}
  .btn-outline:hover{background:var(--ink);color:var(--white);}
  .btn-danger-text{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:2px 4px;}
  .btn-icon{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:14px;padding:2px 6px;}
  .btn-icon:hover{color:var(--red);}

  .proj-list{display:flex;flex-direction:column;gap:4px;max-height:38vh;overflow-y:auto;}
  .proj-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 10px;border-radius:var(--radius);cursor:pointer;
    font-size:13px; color:#C9D2D5;
    border-left:2px solid transparent;
  }
  .proj-item:hover{background:#28353D;}
  .proj-item.active{background:#28353D;border-left-color:var(--orange);color:var(--white);font-weight:600;}
  .proj-item .del{opacity:0;font-size:12px;color:#8FA0A8;}
  .proj-item:hover .del{opacity:1;}
  .proj-item .del:hover{color:var(--red);}

  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid #2C3A42;}

  /* MAIN */
  .main{padding:36px 44px;overflow-x:hidden;transition:margin-left .25s ease;}
  @media (min-width:1024px){
    body.nav-open .main{ margin-left:280px; }
  }
  /* NAV toggle + drawer */
  .nav-toggle{
    position:fixed; top:12px; left:12px; z-index:1100;
    width:40px; height:40px; border:none; border-radius:10px;
    background:var(--ink); color:var(--white);
    font-size:18px; cursor:pointer; display:none;
    align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  body.app-ready .nav-toggle{ display:flex; }
  .nav-toggle:hover{ background:#28353D; }
  .nav-backdrop{
    position:fixed; inset:0; background:rgba(20,28,33,.45);
    opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:900;
  }
  body.nav-open .nav-backdrop{ opacity:1; pointer-events:auto; }
  @media (min-width:1024px){ .nav-backdrop{ display:none; } }
  .empty-state{
    max-width:480px;margin-top:15vh;
  }
  .empty-state h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:30px;margin:0 0 10px;
  }
  .empty-state p{color:var(--ink-soft);line-height:1.6;font-size:14px;}

  .proj-header{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--ink);
    gap:20px;flex-wrap:wrap;
  }
  .proj-title-input{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:700;
    border:none;background:none;color:var(--ink);
    padding:2px 0;min-width:200px;
    border-bottom:1px dashed transparent;
  }
  .proj-title-input:focus{outline:none;border-bottom:1px dashed var(--blue);}
  .proj-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .header-actions{display:flex;gap:8px;}

  .tabs{display:flex;gap:2px;margin-bottom:24px;}
  .tab{
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
    padding:8px 16px;cursor:pointer;color:var(--ink-soft);border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--ink);border-bottom-color:var(--orange);font-weight:600;}

  /* ROOM CARD */
  .room{
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:var(--radius);
    margin-bottom:22px;
    position:relative;
  }
  .room-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;border-bottom:1px solid var(--paper-line);
    background:var(--blue-soft);
  }
  .room-name{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;
    border:none;background:none;color:var(--ink);width:100%;
  }
  .room-name:focus{outline:none;}
  .room-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);}
  .room-body{padding:18px 20px 20px;}

  .dims-row{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:20px;}
  .dim{display:flex;flex-direction:column;gap:5px;}
  .dim label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .dim input{
    font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
    border:none;border-bottom:1.5px solid var(--ink);background:none;
    width:88px;padding:4px 2px;color:var(--ink);
  }
  .dim input:focus{outline:none;border-bottom-color:var(--orange);}
  .dim .unit{color:var(--ink-soft);font-weight:400;font-size:12px;}

  .subsection{margin-bottom:20px;}
  .subsection-title{
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  }
  /* Аккордеон "Виды работ" */
  .works-acc-head{
    width:100%;display:flex;justify-content:space-between;align-items:center;
    background:none;border:none;cursor:pointer;padding:6px 0;
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--ink-soft);
  }
  .works-acc-head:hover{color:var(--ink);}
  .works-acc-head .chev{transition:transform .2s ease;font-size:12px;}
  .works-acc.open .works-acc-head .chev{transform:rotate(180deg);}
  .works-acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .works-acc.open .works-acc-body{max-height:6000px;}

  /* ВИДЫ РАБОТ — выбор через поиск */
  .sel-works{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .sel-work{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--paper-line);border-radius:var(--radius);background:var(--paper);font-size:13px;}
  .sel-work-name{flex:1;color:var(--ink);}
  .sel-work .manual-qty{width:90px;font-size:12px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:5px 7px;background:var(--white);color:var(--ink);}
  .sel-work .manual-qty:focus{outline:none;border-color:var(--blue);}
  .sel-work .wsum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);white-space:nowrap;}
  .work-search{position:relative;}
  .work-search-input{width:100%;box-sizing:border-box;font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:9px 11px;background:var(--white);color:var(--ink);}
  .work-search-input:focus{outline:none;border-color:var(--blue);}
  .work-dropdown{display:none;position:absolute;top:100%;left:0;right:0;z-index:30;max-height:260px;overflow-y:auto;margin-top:4px;background:var(--white);border:1px solid var(--paper-line);border-radius:var(--radius);box-shadow:0 6px 18px rgba(0,0,0,.12);}
  .work-search.open .work-dropdown{display:block;}
  .wd-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--ink);}
  .wd-item:hover{background:var(--paper);}
  .wd-unit{color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;}
  .wd-empty{padding:10px 12px;color:var(--ink-soft);font-size:12px;}
  .opening-row{
    display:grid;grid-template-columns:1fr 105px 105px 90px 24px;gap:8px;align-items:center;
    margin-bottom:6px;font-size:12px;
  }
  .opening-row span{color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .opening-row input{
    font-family:'JetBrains Mono',monospace;font-size:13px;border:1px solid var(--paper-line);
    border-radius:var(--radius);padding:5px 6px;width:100%;background:var(--paper);
  }
  .opening-row input:focus{outline:none;border-color:var(--blue);}
  .add-link{
    background:none;border:none;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;
    padding:4px 0;font-family:'Inter',sans-serif;
  }
  .add-link:hover{color:var(--orange);}

  .work-list{display:flex;flex-direction:column;gap:6px;}
  .work-row{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--paper-line);
    border-radius:var(--radius);background:var(--paper);
  }
  .work-row.checked{border-color:var(--blue);background:var(--white);}
  .work-row input[type=checkbox]{accent-color:var(--orange);width:16px;height:16px;cursor:pointer;}
  .work-row .wname{flex:1;font-size:13px;}
  .work-row .wmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .work-row .manual-qty{
    width:70px;font-family:'JetBrains Mono',monospace;font-size:12px;
    border:1px solid var(--paper-line);border-radius:var(--radius);padding:4px 6px;background:var(--white);
  }
  .work-row .wsum{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--ink);min-width:90px;text-align:right;}

  .room-summary{
    display:flex;gap:18px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--paper-line);
    flex-wrap:wrap;
  }
  .badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .badge b{color:var(--ink);font-size:13px;}

  /* РЕЖИМ РАСЧЁТА ПОМЕЩЕНИЯ */
  .geometry-block{margin-bottom:20px;}
  .calc-mode{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .calc-mode-btn{
    flex:1;min-width:150px;padding:10px 12px;border:1px solid var(--paper-line);
    border-radius:var(--radius);background:var(--white);color:var(--ink-soft);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
    transition:all .15s ease;
  }
  .calc-mode-btn:hover{border-color:var(--ink-soft);color:var(--ink);}
  .calc-mode-btn.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .calc-mode-hint{font-size:13px;color:var(--ink-soft);font-style:italic;padding:6px 0;}
  .dims-hint{font-size:12px;color:var(--ink-soft);margin:0 0 10px;}
  .dims-warn{color:var(--red);font-size:12px;margin:6px 0;min-height:14px;}

  /* ДАННЫЕ ДЛЯ ДОГОВОРА */
  .cust-acc{border:1px solid var(--paper-line);border-radius:var(--radius);background:var(--white);margin-bottom:24px;overflow:hidden;}
  .cust-head{
    width:100%;display:flex;justify-content:space-between;align-items:center;
    background:none;border:none;cursor:pointer;padding:16px 20px;
    font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);
  }
  .cust-head .chev{transition:transform .2s ease;color:var(--ink-soft);}
  .cust-acc.open .cust-head .chev{transform:rotate(180deg);}
  .cust-body{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 20px;}
  .cust-acc.open .cust-body{max-height:2000px;padding:0 20px 20px;}
  .cust-group{margin-bottom:18px;}
  .cust-group-title{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-soft);margin-bottom:10px;border-bottom:1px solid var(--paper-line);padding-bottom:5px;}
  .cust-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cust-field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
  .cust-field label{font-size:12px;color:var(--ink-soft);}
  .cust-field input,.cust-field textarea{
    font-family:'Inter',sans-serif;font-size:14px;border:1px solid var(--paper-line);
    border-radius:var(--radius);padding:9px 11px;background:var(--paper);color:var(--ink);resize:vertical;
  }
  .cust-field input:focus,.cust-field textarea:focus{outline:none;border-color:var(--blue);background:var(--white);}
  .cust-err{color:var(--red);font-size:11px;min-height:13px;}
  .cust-words{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);font-style:italic;}
  .cust-readonly{font-size:16px;color:var(--ink);padding:4px 0;}
  @media (max-width:520px){ .cust-grid{grid-template-columns:1fr;} }

  /* ДОКУМЕНТЫ */
  .docs-block{margin-top:24px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:18px 20px;background:var(--white);}
  .docs-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:12px;}
  .docs-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 0;border-top:1px solid var(--paper-line);}
  .docs-row:first-of-type{border-top:none;}
  .docs-name{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);min-width:70px;}
  .docs-btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .docs-btns .btn{font-size:13px;padding:8px 12px;}
  .docs-group{display:inline-flex;align-items:center;gap:6px;padding:5px 8px 5px 6px;border:1px solid var(--paper-line);border-radius:var(--radius);}
  .docs-icon{display:inline-flex;align-items:center;color:var(--ink-soft);}
  .btn-sm{font-size:12px;padding:6px 10px;}

  /* НАСТРОЙКИ */
  .settings-menu{display:flex;flex-direction:column;gap:12px;max-width:520px;}
  .settings-item{display:flex;justify-content:space-between;align-items:center;width:100%;padding:18px 20px;border:1px solid var(--paper-line);border-radius:var(--radius);background:var(--white);color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:border-color .15s;}
  .settings-item:hover{border-color:var(--ink-soft);}
  .settings-arrow{color:var(--ink-soft);}
  .exec-form{max-width:640px;border:1px solid var(--paper-line);border-radius:var(--radius);background:var(--white);padding:20px;}

  /* ПАНЕЛИ ДОКУМЕНТОВ */
  .doc-panel{border:1px solid var(--paper-line);border-radius:var(--radius);background:var(--white);margin-bottom:12px;overflow:hidden;}
  .doc-main-btn{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;cursor:pointer;padding:16px 20px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);}
  .doc-main-btn .chev{transition:transform .2s;color:var(--ink-soft);}
  .doc-panel.open .doc-main-btn .chev{transform:rotate(180deg);}
  .doc-panel-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 20px;}
  .doc-panel.open .doc-panel-body{max-height:1600px;padding:0 20px 20px;}
  .extra-works{margin-top:16px;border-top:1px solid var(--paper-line);padding-top:14px;}
  .extra-title{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);margin-bottom:10px;}
  .extra-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
  .extra-row{display:grid;grid-template-columns:1fr 70px 74px 84px auto 24px;gap:8px;align-items:center;}
  .extra-row input, .extra-row select{font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:6px 8px;background:var(--paper);color:var(--ink);min-width:0;}
  .extra-row input:focus, .extra-row select:focus{outline:none;border-color:var(--blue);}
  .extra-sum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);text-align:right;white-space:nowrap;}
  @media (max-width:640px){ .extra-row{grid-template-columns:1fr 1fr auto;} }

  /* СХЕМА ФИГУРЫ СТЕНЫ */
  .wall-diagram{
    display:flex;justify-content:center;align-items:center;
    padding:12px;margin:4px 0 12px;background:var(--paper);
    border:1px solid var(--paper-line);border-radius:var(--radius);
    color:#1F2A30;
  }
  [data-theme="dark"] .wall-diagram{ color:#f2f3f2; }

  /* СТЕНЫ */
  .wall-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .wall-row{
    display:grid;grid-template-columns:1fr auto 24px;gap:10px;align-items:center;
    padding:7px 10px;border:1px solid var(--paper-line);border-radius:var(--radius);
    background:var(--paper);font-size:12px;
  }
  .wall-row .wall-label{color:var(--ink);}
  .wall-row .wall-area{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink);}
  .wall-empty{font-size:12px;color:var(--ink-soft);margin-bottom:10px;font-style:italic;}
  .wall-builder{border:1px dashed var(--paper-line);border-radius:var(--radius);padding:12px;}
  .wall-field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .wall-field label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);}
  .wall-field input,.wall-field select{
    font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--paper-line);

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
//  НАСТРОЙКА ПОДКЛЮЧЕНИЯ К ОБЛАКУ
//  Заполните два значения ниже (взять их в кабинете Supabase:
//  Project Settings → Data API / API Keys). Больше ничего
//  в коде менять не нужно.
// ============================================================
const SUPABASE_URL      = 'https://jqbvnhybdxaftbybequy.supabase.co';       // напр. https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_9ktDgBcYQ3BylN5QLh-18g_zqajTlGH';  // длинный ключ "anon public"
// ============================================================

// ---------- STATE ----------
let state = {
  projects: [],
  catalog: [],
  executor: {},
  currentProjectId: null,
  view: 'project' // 'project' | 'catalog' | 'settings' | 'executor'
};

const UNIT_LABEL = { m2:'м²', ml:'м.п.', m3:'м³', pcs:'шт.' };
const APPLIES_LABEL = { walls:'стены', floor:'пол', ceiling:'потолок', perimeter:'периметр', manual:'вручную' };

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const DEFAULT_CATALOG = [
  {id:uid('w'), name:'Штукатурка стен', unit:'m2', price:450, appliesTo:'walls'},
  {id:uid('w'), name:'Покраска стен', unit:'m2', price:250, appliesTo:'walls'},

  {id:uid('w'), name:'Укладка ламината', unit:'m2', price:500, appliesTo:'floor'},
  {id:uid('w'), name:'Укладка плитки (пол)', unit:'m2', price:900, appliesTo:'floor'},
  {id:uid('w'), name:'Натяжной потолок', unit:'m2', price:550, appliesTo:'ceiling'},
  {id:uid('w'), name:'Монтаж плинтуса', unit:'ml', price:180, appliesTo:'perimeter'},
  {id:uid('w'), name:'Монтаж потолочного багета', unit:'ml', price:150, appliesTo:'perimeter'},
  {id:uid('w'), name:'Установка розетки/выключателя', unit:'pcs', price:400, appliesTo:'manual'},
  {id:uid('w'), name:'Демонтажные работы', unit:'m3', price:1200, appliesTo:'manual'},
];

function emptyRoom(){
  return {
    id: uid('r'), name:'Новое помещение',
    length:'', width:'', height:'',
    shape:'rect', dims:{},
    windows:[], doors:[], walls:[], floorSections:[],
    works:[] // {workId, manualQty}
  };
}

function emptyProject(){
  return { id: uid('p'), name:'Новый проект', createdAt: Date.now(), customer:{}, extraWorks:[], rooms:[emptyRoom()] };
}

// ---------- CLOUD (Supabase) ----------
let sb = null;              // клиент Supabase
let currentUser = null;     // текущий пользователь
let pendingSave = false;    // есть несохранённые изменения

function setSync(status, text){
  const dot = document.getElementById('syncDot');
  const t   = document.getElementById('syncText');
  if(dot) dot.className = 'sync-dot' + (status ? (' ' + status) : '');
  if(t)   t.textContent = text;
}

let saveTimer = null;
function scheduleSave(){
  pendingSave = true;
  setSync('saving', 'сохранение…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 700);
}

async function persist(){
  if(!currentUser || !sb) return;
  const payload = { projects: state.projects, catalog: state.catalog, executor: state.executor };
  try{
    const { error } = await sb.from('smeta_state').upsert(
      { user_id: currentUser.id, data: payload, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    if(error) throw error;
    setSync('saved', 'сохранено в облаке');
  }catch(e){
    console.error('Save failed', e);
    setSync('error', 'ошибка сохранения');
  }finally{
    pendingSave = false;
  }
}

async function loadFromCloud(){
  if(!currentUser || !sb) return;
  try{
    const { data, error } = await sb
      .from('smeta_state').select('data')
      .eq('user_id', currentUser.id).maybeSingle();
    if(error) throw error;
    const blob = (data && data.data) ? data.data : null;
    state.projects = (blob && Array.isArray(blob.projects)) ? blob.projects : [];
    state.catalog  = (blob && Array.isArray(blob.catalog) && blob.catalog.length) ? blob.catalog : DEFAULT_CATALOG;
    state.executor = (blob && blob.executor && typeof blob.executor==='object') ? blob.executor : {};
    normalizeProjects();
    setSync('saved', 'синхронизировано');
  }catch(e){
    console.error('Load failed', e);
    if(!state.catalog || !state.catalog.length) state.catalog = DEFAULT_CATALOG;
    setSync('error', 'нет связи с облаком');
  }
  if(state.projects.length && !state.currentProjectId){
    state.currentProjectId = state.projects[0].id;
  }
}

// ---------- AUTH ----------
function showLogin(){ document.getElementById('authOverlay').style.display = 'flex'; }
function hideLogin(){ document.getElementById('authOverlay').style.display = 'none'; }

function authMsg(text, kind){
  const m = document.getElementById('authMsg');
  m.textContent = text || '';
  m.className = 'auth-msg' + (kind ? (' ' + kind) : '');
}

function translateAuthError(m){
  if(/invalid login/i.test(m))        return 'Неверный email или пароль';
  if(/already registered/i.test(m))   return 'Такой email уже зарегистрирован — просто войдите';
  if(/rate limit|too many/i.test(m))  return 'Слишком много попыток, подождите минуту';
  if(/password should be/i.test(m))   return 'Пароль должен быть не короче 6 символов';
  return m;
}

async function doSignIn(){
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  if(!email || !pass){ authMsg('Введите email и пароль', 'err'); return; }
  authMsg('Входим…');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error) authMsg(translateAuthError(error.message), 'err');
}

async function doSignUp(){
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  if(!email || pass.length < 6){ authMsg('Email и пароль от 6 символов', 'err'); return; }
  authMsg('Создаём аккаунт…');
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if(error){ authMsg(translateAuthError(error.message), 'err'); return; }
  if(!data.session){
    authMsg('Аккаунт создан. Подтвердите email по ссылке из письма, затем войдите.', 'ok');
  }
}

async function doSignOut(){
  await sb.auth.signOut();
  state.projects = [];
  state.currentProjectId = null;
  document.body.classList.remove('app-ready');
  setNav(false);
}

async function afterLogin(){
  hideLogin();
  document.body.classList.add('app-ready');
  document.getElementById('userEmail').textContent = currentUser.email || '';
  await loadFromCloud();
  render();
}

// ---------- NAV (сворачивание меню) ----------
function setNav(open){
  document.body.classList.toggle('nav-open', open);
  try{ localStorage.setItem('nav-open', open ? '1' : '0'); }catch(e){}
}
function initNav(){
  let open;
  try{
    const s = localStorage.getItem('nav-open');
    open = (s === null) ? (window.innerWidth >= 1024) : (s === '1');
  }catch(e){ open = window.innerWidth >= 1024; }
  document.body.classList.toggle('nav-open', open);
  const t = document.getElementById('navToggle');
  const b = document.getElementById('navBackdrop');
  if(t) t.onclick = ()=> setNav(!document.body.classList.contains('nav-open'));
  if(b) b.onclick = ()=> setNav(false);
  // на телефоне закрываем меню после выбора проекта
  document.addEventListener('click', e=>{
    if(e.target.closest && e.target.closest('.proj-item') && window.innerWidth < 1024) setNav(false);
  });
}

// ---------- BOOTSTRAP ----------
async function bootstrap(){
  const configured = (typeof window.supabase !== 'undefined') && /^https:\/\//.test(SUPABASE_URL);
  if(!configured){ document.getElementById('configWarn').style.display = 'flex'; return; }

  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });

  // одноразовая привязка статичных элементов
  document.getElementById('authSignIn').onclick = doSignIn;
  document.getElementById('authSignUp').onclick = doSignUp;
  document.getElementById('signOutBtn').onclick = doSignOut;
  document.getElementById('authPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doSignIn(); });
  initNav();

  sb.auth.onAuthStateChange((evt, session)=>{
    currentUser = session?.user || null;
    if(evt === 'SIGNED_IN')  afterLogin();
    if(evt === 'SIGNED_OUT') showLogin();
  });

  const { data:{ session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if(currentUser) afterLogin(); else showLogin();

  // подхватываем свежие данные при возврате на вкладку (переключение устройств)
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && currentUser && !pendingSave){
      loadFromCloud().then(render);
    }
  });
}

// ---------- CALCULATIONS ----------
// какие аккордеоны "Виды работ" раскрыты (по помещению), в пределах сессии
const uiWorksOpen = {};
const uiWorkSearch = {};      // текст поиска по помещению
let uiWorkSearchRefocus = null; // вернуть фокус после render
const uiCustomerOpen = {};
const uiPanel = { smeta:false, dogovor:false };
let uiContractType = 'dogovor';
let uiContractDays = '';
let uiContractDate = '';
let uiSettlementAmount = '';

// ---------- СТЕНЫ (типы фигур) ----------
// ---------- ФОРМЫ ПОМЕЩЕНИЯ (режим "размеры помещения") ----------
// Сложные формы задаются последовательностью стен с направлением обхода (E/N/W/S).
// Площадь считается по контуру (формула площади многоугольника), периметр = сумма стен.
const DIRV = { E:[1,0], N:[0,1], W:[-1,0], S:[0,-1] };
const ROOM_SHAPES = {
  rect: {
    label:'Прямоугольная', simple:true,
    fields:[['a','a — длина'],['b','b — ширина']],
    area:d=>num(d.a)*num(d.b),
    perimeter:d=>2*(num(d.a)+num(d.b)),
  },
  lshape: {
    label:'Г-образная',
    walls:[['a','E'],['b','N'],['c','W'],['d','N'],['e','W'],['f','S']],
  },
  tshape: {
    label:'Т-образная',
    walls:[['a','E'],['b','N'],['c','E'],['d','N'],['e','W'],['f','S'],['g','E'],['h','S']],
  },
  ushape: {
    label:'П-образная',
    walls:[['a','E'],['b','N'],['c','W'],['d','S'],['e','W'],['f','N'],['g','W'],['h','S']],
  },
};
function shapeArea(shape, d){
  const def = ROOM_SHAPES[shape] || ROOM_SHAPES.rect;
  if(def.simple) return def.area(d);
  let x=0,y=0; const pts=[[0,0]];
  def.walls.forEach(([key,dir])=>{ const v=DIRV[dir]; const L=num(d[key]); x+=v[0]*L; y+=v[1]*L; pts.push([x,y]); });
  pts.pop(); // убираем замыкающую точку-дубликат
  let s=0;
  for(let i=0;i<pts.length;i++){ const j=(i+1)%pts.length; s += pts[i][0]*pts[j][1] - pts[j][0]*pts[i][1]; }
  return Math.abs(s)/2;
}
function shapePerimeter(shape, d){
  const def = ROOM_SHAPES[shape] || ROOM_SHAPES.rect;
  if(def.simple) return def.perimeter(d);
  return def.walls.reduce((s,[key])=> s + num(d[key]), 0);
}
function shapeClosure(shape, d){
  const def = ROOM_SHAPES[shape] || ROOM_SHAPES.rect;
  if(def.simple) return 0;
  let x=0,y=0;
  def.walls.forEach(([key,dir])=>{ const v=DIRV[dir]; const L=num(d[key]); x+=v[0]*L; y+=v[1]*L; });
  return Math.hypot(x,y);
}
function shapeFields(shape){
  const def = ROOM_SHAPES[shape] || ROOM_SHAPES.rect;
  if(def.simple) return def.fields.concat([['h','h — высота']]);
  return def.walls.map(([key])=>[key, 'Стена '+key]).concat([['h','h — высота']]);
}

const WALL_SHAPES = {
  rect:      { label:'Прямоугольник / квадрат',                fields:[['a','a — ширина'],['h','h — высота']] },
  trap:      { label:'Трапеция',                                fields:[['a','a — нижнее основание'],['b','b — верхнее основание'],['h','h — высота']] },
  rtrap:     { label:'Прямоугольная трапеция',                  fields:[['a','a — нижнее основание'],['b','b — верхнее основание'],['h','h — высота']] },
  tri:       { label:'Треугольник',                             fields:[['a','a — основание'],['h','h — высота']] },
  rtri:      { label:'Прямоугольный треугольник',               fields:[['a','a — катет'],['b','b — катет']] },
  recttrap:  { label:'Прямоугольник с трапецией',               fields:[['w','w — ширина'],['h1','h₁ — высота прямоуг.'],['b','b — верх трапеции'],['h2','h₂ — высота трапеции']] },
  rectrtrap: { label:'Прямоугольник с прямоугольной трапецией', fields:[['w','w — ширина'],['h1','h₁ — высота прямоуг.'],['b','b — верх трапеции'],['h2','h₂ — высота трапеции']] },
};
function computeWallArea(w){
  switch(w.shape){
    case 'rect':      return num(w.a)*num(w.h);
    case 'trap':
    case 'rtrap':     return ((num(w.a)+num(w.b))/2)*num(w.h);
    case 'tri':       return (num(w.a)*num(w.h))/2;
    case 'rtri':      return (num(w.a)*num(w.b))/2;
    case 'recttrap':
    case 'rectrtrap': return num(w.w)*num(w.h1) + ((num(w.w)+num(w.b))/2)*num(w.h2);
    default:          return 0;
  }
}

const uiWallDraft = {};
function wallDraft(roomId){
  if(!uiWallDraft[roomId]) uiWallDraft[roomId] = { shape:'rect' };
  return uiWallDraft[roomId];
}
// режим расчёта помещения: 'dims' (по размерам) или 'walls' (по стенам)
function normalizeProjects(){
  if(!state.executor || !Object.keys(state.executor).length){
    state.executor = Object.assign({}, DEFAULT_EXECUTOR);
  }
  (state.projects||[]).forEach(p=>{
    if(!p.customer) p.customer = {};
    if(!Array.isArray(p.extraWorks)) p.extraWorks = [];
    (p.rooms||[]).forEach(r=>{
      if(!Array.isArray(r.walls)) r.walls = [];
      if(!Array.isArray(r.windows)) r.windows = [];
      if(!Array.isArray(r.doors)) r.doors = [];
      if(!r.shape) r.shape = 'rect';
      if(!r.dims) r.dims = { a: r.length||'', b: r.width||'', h: r.height||'' };
      if(!Array.isArray(r.floorSections)){
        // участки пола нужны только комнатам в режиме "стены"
        r.floorSections = (r.calcMode==='walls' && (r.length||r.width)) ? [{ l:r.length||'', w:r.width||'' }] : [];
      }
      // старые комнаты с размерами, но без явного режима → режим "помещение"
      if(r.calcMode!=='walls' && r.calcMode!=='dims' && (r.length||r.width||r.height)){
        r.calcMode = 'dims';
      }
    });
  });
}

function roomCalcMode(room){
  if(room.calcMode === 'walls' || room.calcMode === 'dims') return room.calcMode;
  if(room.length || room.width || room.height) return 'dims';
  if((room.walls||[]).length) return 'walls';
  return 'dims';
}

function num(v){
  const n = parseFloat(String(v==null?'':v).replace(',', '.').replace(/\s/g,''));
  return isFinite(n) ? n : 0;
}
function wallBase(w){
  // длина нижней (напольной) стороны стены
  switch(w.shape){
    case 'recttrap':
    case 'rectrtrap': return num(w.w);
    default:          return num(w.a);
  }
}
function calcRoomGeometry(room){
  const L = num(room.length), W = num(room.width), H = num(room.height);
  const mode = roomCalcMode(room);
  const windowsArea = (room.windows||[]).reduce((s,o)=> s + num(o.w)*num(o.h)*(num(o.qty)||0), 0);
  const doorsArea = (room.doors||[]).reduce((s,o)=> s + num(o.w)*num(o.h)*(num(o.qty)||0), 0);
  const doorsWidthSum = (room.doors||[]).reduce((s,o)=> s + num(o.w)*(num(o.qty)||0), 0);
  const wallsSum = (room.walls||[]).reduce((s,w)=> s + computeWallArea(w), 0);

  let perimeter, floorArea, ceilingArea, grossWall;
  if(mode === 'walls'){
    const sections = room.floorSections||[];
    floorArea = sections.length
      ? sections.reduce((s,f)=> s + num(f.l)*num(f.w), 0)
      : L*W; // запасной вариант для старых данных
    ceilingArea = floorArea;
    perimeter = (room.walls||[]).reduce((s,w)=> s + wallBase(w), 0);
    grossWall = wallsSum;
  } else {
    const shape = room.shape || 'rect';
    const d = room.dims || {};
    floorArea = shapeArea(shape, d);
    ceilingArea = floorArea;
    perimeter = shapePerimeter(shape, d);
    grossWall = perimeter * num(d.h);
  }
  const wallArea = Math.max(0, grossWall - windowsArea - doorsArea);
  const perimeterForSkirting = Math.max(0, perimeter - doorsWidthSum);
  return {perimeter, floorArea, ceilingArea, wallArea, perimeterForSkirting, mode};
}

function calcWorkLine(room, roomWork, work){
  const g = calcRoomGeometry(room);
  let qty = 0;
  if(work.unit === 'm2'){
    qty = work.appliesTo==='floor' ? g.floorArea : work.appliesTo==='ceiling' ? g.ceilingArea : g.wallArea;
  } else if(work.unit === 'ml'){
    qty = work.appliesTo==='perimeter' ? g.perimeterForSkirting : g.perimeter;
  } else {
    qty = num(roomWork.manualQty);
  }
  const sum = qty * num(work.price);
  return {qty, sum};
}

const _ONES   = ['','один','два','три','четыре','пять','шесть','семь','восемь','девять'];
const _ONES_F = ['','одна','две','три','четыре','пять','шесть','семь','восемь','девять'];
const _TEENS  = ['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','восемнадцать','девятнадцать'];
const _TENS   = ['','','двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
const _HUND   = ['','сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];
function _triplet(n, fem){
  const w = []; const h = Math.floor(n/100), t = Math.floor((n%100)/10), u = n%10;
  if(h) w.push(_HUND[h]);
  if(t>1){ w.push(_TENS[t]); if(u) w.push((fem?_ONES_F:_ONES)[u]); }
  else if(t===1){ w.push(_TEENS[u]); }
  else if(u){ w.push((fem?_ONES_F:_ONES)[u]); }
  return w.join(' ');
}
function _plural(n, one, few, many){
  const a = Math.abs(n)%100, b = a%10;
  if(a>10 && a<20) return many;
  if(b>1 && b<5) return few;
  if(b===1) return one;
  return many;
}
function rublesToWords(amount){
  amount = Math.max(0, Number(amount)||0);
  const rub = Math.floor(amount);
  const kop = Math.round((amount - rub)*100);
  const groups = [
    {d:1000000000, fem:false, f:['миллиард','миллиарда','миллиардов']},
    {d:1000000,    fem:false, f:['миллион','миллиона','миллионов']},
    {d:1000,       fem:true,  f:['тысяча','тысячи','тысяч']},
  ];
  let n = rub, parts = [];
  for(const g of groups){
    const c = Math.floor(n/g.d); n %= g.d;
    if(c>0){ parts.push(_triplet(c, g.fem)); parts.push(_plural(c, g.f[0], g.f[1], g.f[2])); }
  }
  if(n>0) parts.push(_triplet(n, false));
  let words = parts.filter(Boolean).join(' ').trim();
  if(!words) words = 'ноль';
  words = words.charAt(0).toUpperCase() + words.slice(1);
  const kopStr = String(kop).padStart(2,'0');
  return `${words} ${_plural(rub,'рубль','рубля','рублей')} ${kopStr} ${_plural(kop,'копейка','копейки','копеек')}`;
}

function projectTotal(proj){
  const rooms = (proj.rooms||[]).reduce((sum, r)=> sum + (r.works||[]).reduce((s2, rw)=>{
    const work = state.catalog.find(w=>w.id===rw.workId);
    return work ? s2 + calcWorkLine(r, rw, work).sum : s2;
  }, 0), 0);
  const extra = (proj.extraWorks||[]).reduce((s,e)=> s + num(e.qty)*num(e.price), 0);
  return rooms + extra;
}

  });
  return _scriptCache[url];
}

async function ensurePdfMake(){
  if(!(window.pdfMake && window.pdfMake.vfs)){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js');

    };
  }
}

function formatDate(iso){
  if(!iso) return '';
  const p = String(iso).split('-');
  return (p.length===3) ? `${p[2]}.${p[1]}.${p[0]}` : String(iso);
}
function safeName(proj){
  return (proj.name||'проект').replace(/[^\wа-яА-ЯёЁ \-]/g,'').trim() || 'проект';
}
function buildEstimateData(proj){
  const groups = [];
  (proj.rooms||[]).forEach(room=>{
    const items = [];
    (room.works||[]).forEach(rw=>{
      const work = state.catalog.find(w=>w.id===rw.workId);
      if(!work) return;
      const line = calcWorkLine(room, rw, work);
      items.push({ name:work.name||'—', unit:UNIT_LABEL[work.unit]||'', qty:line.qty, price:num(work.price), sum:line.sum });
    });
    if(items.length) groups.push({ room: room.name||'Помещение', items });
  });
  const extra = (proj.extraWorks||[]).filter(e=>(e.name||'').trim() || num(e.qty) || num(e.price))
    .map(e=>({ name:e.name||'—', unit:UNIT_LABEL[e.unit]||'', qty:num(e.qty), price:num(e.price), sum:num(e.qty)*num(e.price) }));
  if(extra.length) groups.push({ room:'Дополнительные работы', items:extra });
  return { groups, total: projectTotal(proj) };
}

function smetaPdfDef(proj){
  const { groups, total } = buildEstimateData(proj);
  const c = proj.customer || {};
  const body = [[
    {text:'№',style:'th'},{text:'Наименование работ',style:'th'},{text:'Ед.',style:'th'},
    {text:'Кол-во',style:'th'},{text:'Цена',style:'th'},{text:'Сумма',style:'th'}
  ]];
  let no = 0;
  groups.forEach(g=>{
    body.push([{text:g.room, colSpan:6, style:'group'},{},{},{},{},{}]);
    g.items.forEach(it=>{
      no++;
      body.push([
        {text:String(no),style:'td'},
        {text:it.name,style:'td'},
        {text:it.unit,style:'td',alignment:'center'},
        {text:fmt(it.qty),style:'td',alignment:'right'},
        {text:fmt(it.price),style:'td',alignment:'right'},
        {text:fmt(it.sum),style:'td',alignment:'right'},
      ]);
    });
  });

function smetaXlsxBlob(proj){
  const { groups, total } = buildEstimateData(proj);
  const aoa = [['№','Наименование работ','Ед.','Кол-во','Цена','Сумма']];
  let no = 0;
  groups.forEach(g=>{
    aoa.push([g.room,'','','','','']);
    g.items.forEach(it=>{ no++; aoa.push([no, it.name, it.unit, Math.round(it.qty*100)/100, it.price, Math.round(it.sum)]); });
  });
  aoa.push(['','','','','Итого:', Math.round(total)]);
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:5},{wch:42},{wch:8},{wch:10},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Смета');
  const out = XLSX.write(wb, {type:'array', bookType:'xlsx'});
  return new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

function amountInline(amount){
  amount = Math.max(0, num(amount));
  const rub = Math.floor(amount), kop = Math.round((amount-rub)*100);
  const full = rublesToWords(amount);
  const m = full.match(/^(.*?)\s+рубл/);
  const intWords = m ? m[1] : full;
  return `${rub.toLocaleString('ru-RU')} (${intWords}) рублей ${String(kop).padStart(2,'0')} копеек`;
}
const _or = (v, dash)=> (v && String(v).trim()) ? String(v).trim() : (dash||'____________________');
function fioShort(full){
  const parts = String(full||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '';
  const initials = parts.slice(1).map(p=>p[0].toUpperCase()+'.').join('');
  return (parts[0] + (initials ? (' '+initials) : '')).trim();
}

function blocksToPdfContent(blocks){

        { width:'*', stack: b.cols[1].map(t=>({text:t, fontSize:9, margin:[0,0,0,4]})) },
      ], columnGap:24, margin:[0, b.gapTop||6, 0, b.gap!=null?b.gap:8] };
    }
    if(b.sig){
      const one = (role, name)=>[
        {text:role+':', bold:true, fontSize:9, margin:[0,10,0,2]},
        {columns:[{text: name||'______________________', fontSize:9, alignment:'center'},{text:'______________________', fontSize:9, alignment:'center'}]},

      ];
      return { stack:[ ...one('Подрядчик', b.pName), ...one('Заказчик', b.zName) ] };

function blocksToDocHtml(blocks){
  const body = blocks.map(b=>{
    if(b.cols){
      const td = (lines)=>`<td style="width:50%;vertical-align:top;padding:0 12px 0 0;font-size:11pt;">${lines.map(t=>`<p style="margin:0 0 6px;">${escapeHtml(t)}</p>`).join('')}</td>`;
      return `<table style="width:100%;border-collapse:collapse;margin:8px 0;"><tr>${td(b.cols[0])}${td(b.cols[1])}</tr></table>`;
    }
    if(b.sig){
      const one = (role, name)=>`<p style="margin:12px 0 2px;font-weight:bold;">${role}:</p>`+
        `<table style="width:100%;border-collapse:collapse;"><tr>`+
        `<td style="width:50%;text-align:center;font-size:11pt;">${escapeHtml(name||'______________________')}</td>`+
        `<td style="width:50%;text-align:center;font-size:11pt;">______________________</td></tr>`+
        `<tr><td style="text-align:center;font-size:9pt;color:#666;">(Фамилия И.О.)</td>`+
        `<td style="text-align:center;font-size:9pt;color:#666;">(подпись)</td></tr></table>`;
      return one('Подрядчик', b.pName) + one('Заказчик', b.zName);
    }
    const sz = b.style==='h1'?16 : b.style==='h2'?12 : b.style==='small'?9 : 11;
    let st = `margin:0 0 ${(b.gap!=null?b.gap:6)}px;font-size:${sz}pt;`;
    if(b.bold || b.style==='h1' || b.style==='h2') st += 'font-weight:bold;';
    st += 'text-align:'+(b.align||'justify')+';';
    const txt = escapeHtml(b.text||'').replace(/\n/g,'<br>') || '&nbsp;';
    return `<p style="${st}">${txt}</p>`;
  }).join('');
  return `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body style="font-family:'Times New Roman',serif;">${body}</body></html>`;
}
function docBlocksToDocBlob(blocks){

}

async function shareOrDownload(blob, filename, action){
  const file = new File([blob], filename, {type: blob.type});
  if(action === 'share' && navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title: filename}); return; }
    catch(e){ if(e && e.name === 'AbortError') return; /* иначе — падаем в скачивание */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

async function generateDoc(proj, docType, format, action, btn, previewWin){
  const old = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = '…'; }
  try{
    let blob, filename;
    const nm = safeName(proj);
    if(docType==='smeta' && format==='pdf'){
      await ensurePdfMake();
      blob = await new Promise((res,rej)=>{ try{ pdfMake.createPdf(smetaPdfDef(proj)).getBlob(res); }catch(e){ rej(e); } });
      filename = `Смета_${nm}.pdf`;
    } else if(docType==='smeta' && format==='xlsx'){
      await ensureXLSX();
      blob = smetaXlsxBlob(proj);
      filename = `Смета_${nm}.xlsx`;
    } else if(['dogovor','raspiska','akt','dopsrok','rastorzhenie'].includes(docType)){
      const blocks = docType==='dogovor' ? dogovorBlocks(proj)
                   : docType==='raspiska' ? raspiskaBlocks(proj)
                   : docType==='akt' ? aktBlocks(proj)
                   : docType==='dopsrok' ? dopSrokBlocks(proj)
                   : rastorzhenieBlocks(proj);
      const title = { dogovor:'Договор', raspiska:'Расписка', akt:'Акт', dopsrok:'Доп_соглашение_сроки', rastorzhenie:'Соглашение_о_расторжении' }[docType];
      if(format==='pdf'){
        blob = await docBlocksToPdfBlob(blocks);
        filename = `${title}_${nm}.pdf`;
      } else {
        blob = docBlocksToDocBlob(blocks);
        filename = `${title}_${nm}.doc`;
      }
    }
    if(!blob) return;
    if(action === 'preview'){
      openBlobInTab(blob, previewWin);
    } else {
      await shareOrDownload(blob, filename, action);
    }
  }catch(e){
    console.error('Doc generation failed', e);
    if(previewWin){ try{ previewWin.close(); }catch(_){} }
    alert('Не удалось сформировать документ. Проверьте соединение и попробуйте ещё раз.');
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = old; }
  }
}

function openBlobInTab(blob, win){
  const url = URL.createObjectURL(blob);
  if(win && !win.closed){
    win.location = url;
  } else {
    const w = window.open(url, '_blank');
    if(!w){ // всплывающее окно заблокировано — скачиваем
      const a = document.createElement('a'); a.href = url; a.download = 'Документ.pdf';
      document.body.appendChild(a); a.click(); a.remove();
    }
  }
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}

// ---------- ВАЛИДАЦИЯ ПОЛЕЙ ЗАКАЗЧИКА ----------
function validateCustomer(field, v){
  v = (v||'').trim();
  if(!v) return '';
  switch(field){
    case 'email':      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? '' : 'Проверьте e-mail';
    case 'phone':      return /^[+()\d\s-]{6,}$/.test(v) ? '' : 'Проверьте телефон';
    case 'passSeries': return /^\d{4}$/.test(v) ? '' : 'Серия — 4 цифры';
    case 'passNumber': return /^\d{6}$/.test(v) ? '' : 'Номер — 6 цифр';
    case 'passCode':   return /^\d{3}-?\d{3}$/.test(v) ? '' : 'Формат 123-456';
    case 'advance':    return isFinite(num(v)) ? '' : 'Число';
    case 'termDays':   return /^\d+$/.test(v) ? '' : 'Целое число дней';
    default: return '';
  }
}

function renderRoomWorks(room){
  const selected = (room.works||[]).map(rw=>{

    const manual = work.unit==='pcs' || work.unit==='m3' || work.appliesTo==='manual';
    return `<div class="sel-work">
      <span class="sel-work-name">${escapeHtml(work.name)}</span>
      ${manual ? `<input class="manual-qty" type="text" inputmode="decimal" placeholder="${work.unit==='pcs'?'кол-во':'кол-во'}" value="${escapeAttr(rw.manualQty||'')}" data-manual-qty="${room.id}|${work.id}">` : ''}
      <span class="wsum" data-wsum="${room.id}|${work.id}">${fmt(line.qty)} ${UNIT_LABEL[work.unit]} · ${fmtMoney(line.sum)}</span>
      <button class="btn-icon" data-remove-work="${room.id}|${work.id}" title="Убрать">✕</button>
    </div>`;
  }).join('');
  const selIds = new Set((room.works||[]).map(w=>w.workId));

    <div class="subsection">

      <div class="work-search" data-worksearch="${room.id}">

        <div class="work-dropdown" data-worksearch-list="${room.id}">${items || '<div class="wd-empty">Все виды работ уже добавлены</div>'}</div>

          <div class="badge">Площадь пола: <b data-out="floorArea">${fmt(g.floorArea)} м²</b></div>
          <div class="badge">Площадь потолка: <b data-out="ceilingArea">${fmt(g.ceilingArea)} м²</b></div>

function renderGeometryBlock(room){
  let mode = room.calcMode;
  if(mode !== 'dims' && mode !== 'walls'){
    if(room.length || room.width || room.height || (room.dims && Object.values(room.dims).some(v=>v))) mode = 'dims';
    else if((room.walls||[]).length || (room.floorSections||[]).length) mode = 'walls';
    else mode = '';
  }
  const seg = `
    <div class="calc-mode no-print">
      <button type="button" class="calc-mode-btn ${mode==='dims'?'active':''}" data-calc-mode="${room.id}|dims">📐 Размеры помещения</button>
      <button type="button" class="calc-mode-btn ${mode==='walls'?'active':''}" data-calc-mode="${room.id}|walls">🧱 Размеры стен</button>
    </div>`;
  let body;
  if(mode === 'dims'){
    body = renderDimsBlock(room);
  } else if(mode === 'walls'){
    body = renderWallsSection(room) + renderFloorSections(room);
  } else {
    body = `<div class="calc-mode-hint">Выберите способ расчёта: по размерам помещения или по размерам стен.</div>`;
  }
  return `<div class="geometry-block">${seg}${body}</div>`;
}

function renderDimsBlock(room){
  const shape = room.shape || 'rect';
  const def = ROOM_SHAPES[shape] || ROOM_SHAPES.rect;
  const d = room.dims || {};
  const opts = Object.keys(ROOM_SHAPES).map(k=>
    `<option value="${k}" ${k===shape?'selected':''}>${ROOM_SHAPES[k].label}</option>`).join('');
  const fields = shapeFields(shape).map(([key,label])=>`
    <div class="dim">
      <label>${label}${key==='h'?'':' <span class="unit">(м)</span>'}</label>
      <input type="text" inputmode="decimal" placeholder="0" value="${escapeAttr(d[key]||'')}" data-shapedim="${room.id}|${key}">
    </div>`).join('');
  const closure = shapeClosure(shape, d);
  const closureWarn = (!def.simple && closure > 0.05)
    ? `Контур не замыкается (расхождение ${fmt(closure)} м) — проверьте длины стен.` : '';
  const hint = def.simple ? '' : '<div class="dims-hint">Введите длину каждой стены по схеме — площадь считается по контуру.</div>';
  return `
    <div class="wall-field" style="margin-bottom:12px;">
      <label>Форма помещения</label>
      <select data-room-shape="${room.id}">${opts}</select>
    </div>
    <div class="wall-diagram">${roomShapeSVG(shape)}</div>
    ${hint}
    <div class="dims-row">${fields}</div>
    <div class="dims-warn" data-dimwarn="${room.id}">${closureWarn}</div>
    <div class="floor-total">Площадь пола: <b data-dimarea="${room.id}">${fmt(shapeArea(shape, d))}</b> м² · Периметр: <b data-dimperim="${room.id}">${fmt(shapePerimeter(shape, d))}</b> м.п.</div>`;
}

function renderFloorSections(room){
  const secs = room.floorSections||[];
  const rows = secs.map((f,i)=>`
    <div class="floor-row">
      <span>участок ${i+1}</span>
      <input type="text" inputmode="decimal" placeholder="длина" value="${escapeAttr(f.l)}" data-floor="${room.id}|${i}|l">
      <input type="text" inputmode="decimal" placeholder="ширина" value="${escapeAttr(f.w)}" data-floor="${room.id}|${i}|w">
      <span class="floor-area" data-floor-area="${room.id}|${i}">${fmt(num(f.l)*num(f.w))} м²</span>
      <button class="btn-icon" data-del-floor="${room.id}|${i}" title="Удалить">✕</button>
    </div>`).join('');
  const total = secs.reduce((s,f)=> s + num(f.l)*num(f.w), 0);
  return `
    <div class="subsection">
      <div class="subsection-title">Пол и потолок <span class="hint-inline">разбейте на прямоугольные участки</span></div>
      ${rows || `<div class="wall-empty">Участки пола не заданы — площадь пола 0. Добавьте участки (напр. Т-образная комната — 2 прямоугольника).</div>`}
      <button class="add-link" data-add-floor="${room.id}">+ Добавить участок</button>
      <div class="floor-total">Площадь пола: <b data-floor-total="${room.id}">${fmt(total)}</b> м²</div>
    </div>`;
}

function renderWallsSection(room){
  const draft = wallDraft(room.id);
  const shape = draft.shape || 'rect';
  const cfg = WALL_SHAPES[shape] || WALL_SHAPES.rect;
  const wallsList = (room.walls||[]).map((w,i)=>{
    const label = WALL_SHAPES[w.shape] ? WALL_SHAPES[w.shape].label : 'Стена';
    return `
      <div class="wall-row">
        <span class="wall-label">${escapeHtml(label)}</span>
        <span class="wall-area">${fmt(computeWallArea(w))} м²</span>
        <button class="btn-icon" data-del-wall="${room.id}|${i}" title="Удалить">✕</button>
      </div>`;
  }).join('');
  const fieldsHtml = cfg.fields.map(([key,label])=>`
    <div class="wall-field">
      <label>${label}</label>
      <input type="text" inputmode="decimal" placeholder="0" value="${escapeAttr(draft[key]||'')}" data-wall-draft="${room.id}|${key}">
    </div>`).join('');
  const optionsHtml = Object.keys(WALL_SHAPES).map(k=>
    `<option value="${k}" ${k===shape?'selected':''}>${WALL_SHAPES[k].label}</option>`).join('');
  return `

      ${wallsList ? `<div class="wall-list">${wallsList}</div>`
        : `<div class="wall-empty">Стены пока не добавлены — площадь стен равна 0. Добавьте хотя бы одну.</div>`}
      <div class="wall-builder">
        <div class="wall-field">
          <label>Тип стены</label>
          <select data-wall-shape="${room.id}">${optionsHtml}</select>
        </div>
        <div class="wall-diagram">${wallShapeSVG(shape)}</div>
        <div class="wall-fields" data-wall-fields="${room.id}">${fieldsHtml}</div>
        <div class="wall-preview-row">
          <span class="wall-preview">S = <b data-wall-preview="${room.id}">${fmt(computeWallArea(draft))}</b> м²</span>
          <button class="add-link" data-add-wall="${room.id}">+ Добавить стену</button>
        </div>
        <div class="wall-error" data-wall-error="${room.id}"></div>
      </div>
    </div>`;
}

// Схемы форм помещения (вид сверху) с подписями сторон
function roomShapeSVG(shape){
  const st = 'fill:none;stroke:currentColor;stroke-width:2;stroke-linejoin:round;';
  const t = 'font-family:JetBrains Mono,monospace;font-size:13px;fill:currentColor;';
  const lbl = (x,y,s)=>`<text x="${x}" y="${y}" text-anchor="middle" style="${t}">${s}</text>`;
  let path='', labels='';
  switch(shape){
    case 'rect':
      path = `<rect x="40" y="30" width="140" height="100" style="${st}"/>`;
      labels = lbl(110,150,'a') + `<text x="190" y="84" style="${t}">b</text>`;
      break;
    case 'lshape':
      path = `<path d="M40 140 L170 140 L170 90 L110 90 L110 40 L40 40 Z" style="${st}"/>`;
      labels = lbl(105,156,'a')+lbl(180,118,'b')+lbl(140,84,'c')+lbl(120,68,'d')+lbl(75,34,'e')+lbl(32,95,'f');
      break;
    case 'tshape':
      path = `<path d="M90 140 L130 140 L130 80 L180 80 L180 40 L40 40 L40 80 L90 80 Z" style="${st}"/>`;
      labels = lbl(110,156,'a')+lbl(138,112,'b')+lbl(155,74,'c')+lbl(190,62,'d')+lbl(110,34,'e')+lbl(32,62,'f')+lbl(65,74,'g')+lbl(82,112,'h');
      break;
    case 'ushape':
      path = `<path d="M40 140 L180 140 L180 40 L130 40 L130 90 L90 90 L90 40 L40 40 Z" style="${st}"/>`;
      labels = lbl(110,156,'a')+lbl(190,90,'b')+lbl(155,34,'c')+lbl(138,68,'d')+lbl(110,104,'e')+lbl(82,68,'f')+lbl(65,34,'g')+lbl(32,90,'h');
      break;
    default: path='';
  }
  return `<svg viewBox="0 0 220 165" width="100%" style="max-width:260px;">${path}${labels}</svg>`;
}

// Схемы фигур с подписанными сторонами (буквы совпадают с полями)
function wallShapeSVG(shape){
  const st = 'fill:none;stroke:currentColor;stroke-width:2;stroke-linejoin:round;';
  const dash = 'fill:none;stroke:currentColor;stroke-width:1.2;stroke-dasharray:4 3;opacity:0.55;';
  const t = 'font-family:JetBrains Mono,monospace;font-size:13px;fill:currentColor;';
  const tm = 'font-family:JetBrains Mono,monospace;font-size:13px;fill:currentColor;opacity:0.6;';
  let inner = '';
  switch(shape){
    case 'rect':
      inner = `<rect x="40" y="20" width="140" height="90" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">a</text>
        <text x="190" y="70" style="${t}">h</text>`;
      break;
    case 'trap':
      inner = `<path d="M40 110 L180 110 L150 20 L70 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">a</text>
        <text x="110" y="14" text-anchor="middle" style="${t}">b</text>
        <line x1="110" y1="20" x2="110" y2="110" style="${dash}"/>
        <text x="118" y="68" style="${tm}">h</text>`;
      break;
    case 'rtrap':
      inner = `<path d="M40 110 L180 110 L180 20 L40 20 L40 110 Z" style="${st}" opacity="0"/>
        <path d="M40 110 L180 110 L180 40 L40 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">a</text>
        <text x="110" y="14" text-anchor="middle" style="${t}">b</text>
        <text x="188" y="78" style="${tm}">h</text>`;
      break;
    case 'tri':
      inner = `<path d="M40 110 L180 110 L110 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">a</text>
        <line x1="110" y1="20" x2="110" y2="110" style="${dash}"/>
        <text x="118" y="68" style="${tm}">h</text>`;
      break;
    case 'rtri':
      inner = `<path d="M40 110 L180 110 L40 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">a</text>
        <text x="24" y="70" style="${t}">b</text>`;
      break;
    case 'recttrap':
      inner = `<path d="M40 110 L180 110 L180 60 L40 60 Z" style="${st}"/>
        <path d="M40 60 L180 60 L145 20 L75 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">w</text>
        <text x="190" y="90" style="${t}">h₁</text>
        <text x="110" y="14" text-anchor="middle" style="${t}">b</text>
        <text x="150" y="46" style="${tm}">h₂</text>`;
      break;
    case 'rectrtrap':
      inner = `<path d="M40 110 L180 110 L180 60 L40 60 Z" style="${st}"/>
        <path d="M40 60 L180 60 L180 20 L75 20 Z" style="${st}"/>
        <text x="110" y="128" text-anchor="middle" style="${t}">w</text>
        <text x="190" y="90" style="${t}">h₁</text>
        <text x="120" y="14" text-anchor="middle" style="${t}">b</text>
        <text x="150" y="46" style="${tm}">h₂</text>`;
      break;
    default:
      inner = '';
  }
  return `<svg viewBox="0 0 220 140" width="100%" style="max-width:240px;">${inner}</svg>`;
}

function renderSmetaTable(proj){
  const rowsHtml = [];
  let hasAny = false;
  proj.rooms.forEach(room=>{
    const roomWorks = (room.works||[]).map(rw=>{
      const work = state.catalog.find(w=>w.id===rw.workId);
      if(!work) return null;
      const line = calcWorkLine(room, rw, work);
      if(line.qty<=0) return null;
      return {work, line};
    }).filter(Boolean);
    if(roomWorks.length===0) return;
    hasAny = true;
    rowsHtml.push(`<tr class="room-divider"><td colspan="5">${escapeHtml(room.name)}</td></tr>`);
    roomWorks.forEach(({work,line})=>{
      rowsHtml.push(`
        <tr>
          <td>${escapeHtml(work.name)}</td>
          <td class="num">${UNIT_LABEL[work.unit]}</td>
          <td class="num">${fmt(line.qty)}</td>
          <td class="num">${fmtMoney(work.price)}</td>
          <td class="num"><b>${fmtMoney(line.sum)}</b></td>
        </tr>
      `);
    });
  });
  if(!hasAny && !(proj.extraWorks||[]).length){
    return `<div class="empty-hint">Добавьте помещения и отметьте виды работ — позиции появятся здесь.</div>`;
  }
  (proj.extraWorks||[]).forEach(e=>{
    const nm = (e.name||'').trim();
    if(!nm && !num(e.qty) && !num(e.price)) return;
    if(rowsHtml.findIndex(r=>r.includes('Дополнительные работы'))===-1){
      rowsHtml.push(`<tr class="room-divider"><td colspan="5">Дополнительные работы</td></tr>`);
    }
    const sum = num(e.qty)*num(e.price);
    rowsHtml.push(`
      <tr>
        <td>${escapeHtml(nm||'—')}</td>
        <td class="num">${UNIT_LABEL[e.unit]||''}</td>
        <td class="num">${fmt(num(e.qty))}</td>
        <td class="num">${fmtMoney(num(e.price))}</td>
        <td class="num"><b>${fmtMoney(sum)}</b></td>
      </tr>`);
  });
  if(!rowsHtml.length){
    return `<div class="empty-hint">Добавьте помещения и отметьте виды работ — позиции появятся здесь.</div>`;
  }
  return `
    <div class="smeta-scroll">
      <table class="smeta">
        <thead><tr><th>Вид работ</th><th>Ед.</th><th>Кол-во</th><th>Цена</th><th>Сумма</th></tr></thead>
        <tbody>${rowsHtml.join('')}</tbody>
      </table>
    </div>
  `;
}
