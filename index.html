<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СМЕТА — расчёт ремонтных работ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --paper-line:#D9D2BE;
    --ink:#1E2A32;
    --ink-soft:#5B6B74;
    --blue:#2C5F7C;
    --blue-soft:#DDE7EA;
    --orange:#E8622C;
    --orange-soft:#FBE4D8;
    --green:#4A7C59;
    --red:#B33A2E;
    --white:#FFFDF9;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
  }
  /* SIDEBAR */
  .sidebar{
    background:var(--ink);
    color:var(--white);
    padding:24px 20px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand span{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--orange);
    font-weight:500;
  }
  .sb-section{display:flex;flex-direction:column;gap:8px;}
  .sb-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:#8FA0A8;
    margin-bottom:2px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    border:none;
    border-radius:var(--radius);
    padding:9px 14px;
    cursor:pointer;
    transition:transform .08s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--orange);color:var(--white);}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--white);border:1px solid #3D4B53;}
  .btn-ghost:hover{border-color:var(--orange);}
  .btn-outline{background:transparent;color:var(--ink);border:1px solid var(--ink);}
  .btn-outline:hover{background:var(--ink);color:var(--white);}
  .btn-danger-text{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:2px 4px;}
  .btn-icon{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:14px;padding:2px 6px;}
  .btn-icon:hover{color:var(--red);}

  .proj-list{display:flex;flex-direction:column;gap:4px;max-height:38vh;overflow-y:auto;}
  .proj-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 10px;border-radius:var(--radius);cursor:pointer;
    font-size:13px; color:#C9D2D5;
    border-left:2px solid transparent;
  }
  .proj-item:hover{background:#28353D;}
  .proj-item.active{background:#28353D;border-left-color:var(--orange);color:var(--white);font-weight:600;}
  .proj-item .del{opacity:0;font-size:12px;color:#8FA0A8;}
  .proj-item:hover .del{opacity:1;}
  .proj-item .del:hover{color:var(--red);}

  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid #2C3A42;}

  /* MAIN */
  .main{padding:36px 44px;overflow-x:hidden;}
  .empty-state{
    max-width:480px;margin-top:15vh;
  }
  .empty-state h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:30px;margin:0 0 10px;
  }
  .empty-state p{color:var(--ink-soft);line-height:1.6;font-size:14px;}

  .proj-header{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--ink);
    gap:20px;flex-wrap:wrap;
  }
  .proj-title-input{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:700;
    border:none;background:none;color:var(--ink);
    padding:2px 0;min-width:200px;
    border-bottom:1px dashed transparent;
  }
  .proj-title-input:focus{outline:none;border-bottom:1px dashed var(--blue);}
  .proj-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .header-actions{display:flex;gap:8px;}

  .tabs{display:flex;gap:2px;margin-bottom:24px;}
  .tab{
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
    padding:8px 16px;cursor:pointer;color:var(--ink-soft);border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--ink);border-bottom-color:var(--orange);font-weight:600;}

  /* ROOM CARD */
  .room{
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:var(--radius);
    margin-bottom:22px;
    position:relative;
  }
  .room-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;border-bottom:1px solid var(--paper-line);
    background:var(--blue-soft);
  }
  .room-name{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;
    border:none;background:none;color:var(--ink);width:100%;
  }
  .room-name:focus{outline:none;}
  .room-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);}
  .room-body{padding:18px 20px 20px;}

  .dims-row{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:20px;}
  .dim{display:flex;flex-direction:column;gap:5px;}
  .dim label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .dim input{
    font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
    border:none;border-bottom:1.5px solid var(--ink);background:none;
    width:88px;padding:4px 2px;color:var(--ink);
  }
  .dim input:focus{outline:none;border-bottom-color:var(--orange);}
  .dim .unit{color:var(--ink-soft);font-weight:400;font-size:12px;}

  .subsection{margin-bottom:20px;}
  .subsection-title{
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  }
  .opening-row{
    display:grid;grid-template-columns:1fr 70px 70px 60px 24px;gap:8px;align-items:center;
    margin-bottom:6px;font-size:12px;
  }
  .opening-row span{color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .opening-row input{
    font-family:'JetBrains Mono',monospace;font-size:13px;border:1px solid var(--paper-line);
    border-radius:var(--radius);padding:5px 6px;width:100%;background:var(--paper);
  }
  .opening-row input:focus{outline:none;border-color:var(--blue);}
  .add-link{
    background:none;border:none;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;
    padding:4px 0;font-family:'Inter',sans-serif;
  }
  .add-link:hover{color:var(--orange);}

  .work-list{display:flex;flex-direction:column;gap:6px;}
  .work-row{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--paper-line);
    border-radius:var(--radius);background:var(--paper);
  }
  .work-row.checked{border-color:var(--blue);background:var(--white);}
  .work-row input[type=checkbox]{accent-color:var(--orange);width:16px;height:16px;cursor:pointer;}
  .work-row .wname{flex:1;font-size:13px;}
  .work-row .wmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .work-row .manual-qty{
    width:70px;font-family:'JetBrains Mono',monospace;font-size:12px;
    border:1px solid var(--paper-line);border-radius:var(--radius);padding:4px 6px;background:var(--white);
  }
  .work-row .wsum{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--ink);min-width:90px;text-align:right;}

  .room-summary{
    display:flex;gap:18px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--paper-line);
    flex-wrap:wrap;
  }
  .badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .badge b{color:var(--ink);font-size:13px;}

  .add-room-btn{
    width:100%;padding:16px;border:2px dashed var(--paper-line);border-radius:var(--radius);
    background:none;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);
    cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;
  }
  .add-room-btn:hover{border-color:var(--orange);color:var(--orange);}

  /* SMETA TABLE */
  .smeta-wrap{background:var(--white);border:1px solid var(--ink);margin-top:10px;}
  .smeta-head{
    padding:14px 20px;border-bottom:1px solid var(--ink);
    display:flex;justify-content:space-between;align-items:center;
  }
  .smeta-head h2{font-family:'Space Grotesk',sans-serif;font-size:16px;margin:0;}
  table.smeta{width:100%;border-collapse:collapse;font-size:13px;}
  table.smeta th{
    font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;
    text-align:left;color:var(--ink-soft);padding:8px 20px;border-bottom:1px solid var(--paper-line);
  }
  table.smeta td{padding:9px 20px;border-bottom:1px solid var(--paper-line);}
  table.smeta tr.room-divider td{
    background:var(--blue-soft);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:0.05em;color:var(--blue);
  }
  table.smeta td.num{font-family:'JetBrains Mono',monospace;text-align:right;}
  .smeta-total{
    display:flex;justify-content:space-between;align-items:center;padding:18px 20px;background:var(--ink);color:var(--white);
  }
  .smeta-total .label{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#9FB0B8;}
  .smeta-total .value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--orange);}

  /* CATALOG */
  .catalog-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--ink);}
  .catalog-table th{
    font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;
    text-align:left;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--ink);background:var(--blue-soft);
  }
  .catalog-table td{padding:8px 14px;border-bottom:1px solid var(--paper-line);}
  .catalog-table input, .catalog-table select{
    font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--paper-line);border-radius:var(--radius);
    padding:6px 8px;background:var(--paper);width:100%;
  }
  .catalog-table select{font-family:'JetBrains Mono',monospace;font-size:12px;}
  .catalog-table input:focus,.catalog-table select:focus{outline:none;border-color:var(--blue);}

  .empty-hint{color:var(--ink-soft);font-size:13px;font-style:italic;padding:20px;text-align:center;}

  @media print{
    .sidebar,.tabs,.header-actions,.add-room-btn,.no-print{display:none !important;}
    .app{display:block;}
    .main{padding:0;}
    body{background:white;}
    .room{break-inside:avoid;}
  }
  @media (max-width:820px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:sticky;top:0;z-index:10;}
    .main{padding:24px 18px;}
  }

  /* AUTH + SYNC */
  .auth-overlay{
    position:fixed;inset:0;z-index:1000;background:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .auth-card{
    background:var(--white);border:1px solid #000;border-radius:var(--radius);
    max-width:360px;width:100%;padding:30px 28px;
  }
  .auth-card h1{font-family:'Space Grotesk',sans-serif;font-size:24px;margin:0 0 2px;letter-spacing:0.02em;}
  .auth-card .sub{color:var(--ink-soft);font-size:11px;margin-bottom:22px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;}
  .auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .auth-field label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);}
  .auth-field input{font-family:'Inter',sans-serif;font-size:14px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:10px 12px;background:var(--paper);color:var(--ink);}
  .auth-field input:focus{outline:none;border-color:var(--blue);}
  .auth-actions{display:flex;gap:8px;margin-top:4px;}
  .auth-actions .btn{flex:1;}
  .auth-msg{font-size:12px;margin-top:14px;min-height:16px;line-height:1.5;}
  .auth-msg.err{color:var(--red);}
  .auth-msg.ok{color:var(--green);}
  .user-email{font-family:'JetBrains Mono',monospace;font-size:11px;color:#C9D2D5;word-break:break-all;margin-bottom:6px;}
  .sync-status{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8FA0A8;display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#8FA0A8;flex:0 0 auto;}
  .sync-dot.saved{background:var(--green);}
  .sync-dot.saving{background:var(--orange);}
  .sync-dot.error{background:var(--red);}
  .config-warn{
    position:fixed;inset:0;z-index:1001;background:var(--ink);color:var(--white);
    display:flex;align-items:center;justify-content:center;padding:24px;
    font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;text-align:center;
  }
  .config-warn code{color:var(--orange);}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">СМЕТА<span>РЕМОНТ.РАСЧЁТ</span></div>

    <div class="sb-section">
      <button class="btn btn-primary" id="newProjectBtn">+ Новый проект</button>
    </div>

    <div class="sb-section">
      <div class="sb-label">Мои проекты</div>
      <div class="proj-list" id="projList"></div>
    </div>

    <div class="sidebar-footer sb-section">
      <button class="btn btn-ghost" id="catalogBtn">⚙ Виды работ</button>
      <div class="user-email" id="userEmail"></div>
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">—</span></div>
      <button class="btn btn-ghost" id="signOutBtn">Выйти</button>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- Экран входа -->
<div class="auth-overlay" id="authOverlay" style="display:none;">
  <div class="auth-card">
    <h1>СМЕТА</h1>
    <div class="sub">вход в аккаунт</div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" autocomplete="username" placeholder="you@example.com">
    </div>
    <div class="auth-field">
      <label>Пароль</label>
      <input type="password" id="authPass" autocomplete="current-password" placeholder="минимум 6 символов">
    </div>
    <div class="auth-actions">
      <button class="btn btn-primary" id="authSignIn">Войти</button>
      <button class="btn btn-outline" id="authSignUp">Регистрация</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- Экран «не настроено» -->
<div class="config-warn" id="configWarn" style="display:none;">
  <div>
    ⚙ Приложение ещё не подключено к облаку.<br>
    Впишите <code>SUPABASE_URL</code> и <code>SUPABASE_ANON_KEY</code><br>
    в начале блока &lt;script&gt; и откройте страницу снова.<br>
    <span style="color:#8FA0A8;">(см. инструкцию по настройке)</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
//  НАСТРОЙКА ПОДКЛЮЧЕНИЯ К ОБЛАКУ
//  Заполните два значения ниже (взять их в кабинете Supabase:
//  Project Settings → Data API / API Keys). Больше ничего
//  в коде менять не нужно.
// ============================================================
const SUPABASE_URL      = https://jqbvnhybdxaftbybequy.supabase.co;       // напр. https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = sb_publishable_9ktDgBcYQ3BylN5QLh-18g_zqajTlGH;  // длинный ключ "anon public"
// ============================================================

// ---------- STATE ----------
let state = {
  projects: [],
  catalog: [],
  currentProjectId: null,
  view: 'project' // 'project' | 'catalog'
};

const UNIT_LABEL = { m2:'м²', ml:'м.п.', m3:'м³', pcs:'шт.' };
const APPLIES_LABEL = { walls:'стены', floor:'пол', ceiling:'потолок', perimeter:'периметр', manual:'вручную' };

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const DEFAULT_CATALOG = [
  {id:uid('w'), name:'Штукатурка стен', unit:'m2', price:450, appliesTo:'walls'},
  {id:uid('w'), name:'Покраска стен', unit:'m2', price:250, appliesTo:'walls'},
  {id:uid('w'), name:'Поклейка обоев', unit:'m2', price:300, appliesTo:'walls'},
  {id:uid('w'), name:'Выравнивание пола (стяжка)', unit:'m2', price:600, appliesTo:'floor'},
  {id:uid('w'), name:'Укладка ламината', unit:'m2', price:500, appliesTo:'floor'},
  {id:uid('w'), name:'Укладка плитки (пол)', unit:'m2', price:900, appliesTo:'floor'},
  {id:uid('w'), name:'Натяжной потолок', unit:'m2', price:550, appliesTo:'ceiling'},
  {id:uid('w'), name:'Монтаж плинтуса', unit:'ml', price:180, appliesTo:'perimeter'},
  {id:uid('w'), name:'Монтаж потолочного багета', unit:'ml', price:150, appliesTo:'perimeter'},
  {id:uid('w'), name:'Установка розетки/выключателя', unit:'pcs', price:400, appliesTo:'manual'},
  {id:uid('w'), name:'Демонтажные работы', unit:'m3', price:1200, appliesTo:'manual'},
];

function emptyRoom(){
  return {
    id: uid('r'), name:'Новое помещение',
    length:'', width:'', height:'',
    windows:[], doors:[],
    works:[] // {workId, manualQty}
  };
}

function emptyProject(){
  return { id: uid('p'), name:'Новый проект', createdAt: Date.now(), rooms:[emptyRoom()] };
}

// ---------- CLOUD (Supabase) ----------
let sb = null;              // клиент Supabase
let currentUser = null;     // текущий пользователь
let pendingSave = false;    // есть несохранённые изменения

function setSync(status, text){
  const dot = document.getElementById('syncDot');
  const t   = document.getElementById('syncText');
  if(dot) dot.className = 'sync-dot' + (status ? (' ' + status) : '');
  if(t)   t.textContent = text;
}

let saveTimer = null;
function scheduleSave(){
  pendingSave = true;
  setSync('saving', 'сохранение…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 700);
}

async function persist(){
  if(!currentUser || !sb) return;
  const payload = { projects: state.projects, catalog: state.catalog };
  try{
    const { error } = await sb.from('smeta_state').upsert(
      { user_id: currentUser.id, data: payload, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    if(error) throw error;
    setSync('saved', 'сохранено в облаке');
  }catch(e){
    console.error('Save failed', e);
    setSync('error', 'ошибка сохранения');
  }finally{
    pendingSave = false;
  }
}

async function loadFromCloud(){
  if(!currentUser || !sb) return;
  try{
    const { data, error } = await sb
      .from('smeta_state').select('data')
      .eq('user_id', currentUser.id).maybeSingle();
    if(error) throw error;
    const blob = (data && data.data) ? data.data : null;
    state.projects = (blob && Array.isArray(blob.projects)) ? blob.projects : [];
    state.catalog  = (blob && Array.isArray(blob.catalog) && blob.catalog.length) ? blob.catalog : DEFAULT_CATALOG;
    setSync('saved', 'синхронизировано');
  }catch(e){
    console.error('Load failed', e);
    if(!state.catalog || !state.catalog.length) state.catalog = DEFAULT_CATALOG;
    setSync('error', 'нет связи с облаком');
  }
  if(state.projects.length && !state.currentProjectId){
    state.currentProjectId = state.projects[0].id;
  }
}

// ---------- AUTH ----------
function showLogin(){ document.getElementById('authOverlay').style.display = 'flex'; }
function hideLogin(){ document.getElementById('authOverlay').style.display = 'none'; }

function authMsg(text, kind){
  const m = document.getElementById('authMsg');
  m.textContent = text || '';
  m.className = 'auth-msg' + (kind ? (' ' + kind) : '');
}

function translateAuthError(m){
  if(/invalid login/i.test(m))        return 'Неверный email или пароль';
  if(/already registered/i.test(m))   return 'Такой email уже зарегистрирован — просто войдите';
  if(/rate limit|too many/i.test(m))  return 'Слишком много попыток, подождите минуту';
  if(/password should be/i.test(m))   return 'Пароль должен быть не короче 6 символов';
  return m;
}

async function doSignIn(){
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  if(!email || !pass){ authMsg('Введите email и пароль', 'err'); return; }
  authMsg('Входим…');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error) authMsg(translateAuthError(error.message), 'err');
}

async function doSignUp(){
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  if(!email || pass.length < 6){ authMsg('Email и пароль от 6 символов', 'err'); return; }
  authMsg('Создаём аккаунт…');
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if(error){ authMsg(translateAuthError(error.message), 'err'); return; }
  if(!data.session){
    authMsg('Аккаунт создан. Подтвердите email по ссылке из письма, затем войдите.', 'ok');
  }
}

async function doSignOut(){
  await sb.auth.signOut();
  state.projects = [];
  state.currentProjectId = null;
}

async function afterLogin(){
  hideLogin();
  document.getElementById('userEmail').textContent = currentUser.email || '';
  await loadFromCloud();
  render();
}

// ---------- BOOTSTRAP ----------
async function bootstrap(){
  const configured = (typeof window.supabase !== 'undefined') && /^https:\/\//.test(SUPABASE_URL);
  if(!configured){ document.getElementById('configWarn').style.display = 'flex'; return; }

  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });

  // одноразовая привязка статичных элементов
  document.getElementById('authSignIn').onclick = doSignIn;
  document.getElementById('authSignUp').onclick = doSignUp;
  document.getElementById('signOutBtn').onclick = doSignOut;
  document.getElementById('authPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doSignIn(); });

  sb.auth.onAuthStateChange((evt, session)=>{
    currentUser = session?.user || null;
    if(evt === 'SIGNED_IN')  afterLogin();
    if(evt === 'SIGNED_OUT') showLogin();
  });

  const { data:{ session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if(currentUser) afterLogin(); else showLogin();

  // подхватываем свежие данные при возврате на вкладку (переключение устройств)
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && currentUser && !pendingSave){
      loadFromCloud().then(render);
    }
  });
}

// ---------- CALCULATIONS ----------
function calcRoomGeometry(room){
  const L = parseFloat(room.length)||0, W = parseFloat(room.width)||0, H = parseFloat(room.height)||0;
  const perimeter = (L+W)*2;
  const floorArea = L*W;
  const ceilingArea = L*W;
  const windowsArea = (room.windows||[]).reduce((s,o)=> s + (parseFloat(o.w)||0)*(parseFloat(o.h)||0)*(parseInt(o.qty)||0), 0);
  const doorsArea = (room.doors||[]).reduce((s,o)=> s + (parseFloat(o.w)||0)*(parseFloat(o.h)||0)*(parseInt(o.qty)||0), 0);
  const doorsWidthSum = (room.doors||[]).reduce((s,o)=> s + (parseFloat(o.w)||0)*(parseInt(o.qty)||0), 0);
  const wallArea = Math.max(0, perimeter*H - windowsArea - doorsArea);
  const perimeterForSkirting = Math.max(0, perimeter - doorsWidthSum);
  return {perimeter, floorArea, ceilingArea, wallArea, perimeterForSkirting};
}

function calcWorkLine(room, roomWork, work){
  const g = calcRoomGeometry(room);
  let qty = 0;
  if(work.unit === 'm2'){
    qty = work.appliesTo==='floor' ? g.floorArea : work.appliesTo==='ceiling' ? g.ceilingArea : g.wallArea;
  } else if(work.unit === 'ml'){
    qty = work.appliesTo==='perimeter' ? g.perimeterForSkirting : g.perimeter;
  } else {
    qty = parseFloat(roomWork.manualQty)||0;
  }
  const sum = qty * (parseFloat(work.price)||0);
  return {qty, sum};
}

function fmt(n){ return (Math.round(n*100)/100).toLocaleString('ru-RU', {maximumFractionDigits:2}); }
function fmtMoney(n){ return Math.round(n).toLocaleString('ru-RU') + ' ₽'; }

function currentProject(){
  return state.projects.find(p=>p.id===state.currentProjectId) || null;
}

// ---------- RENDER ----------
function render(){
  renderSidebar();
  const main = document.getElementById('main');
  if(state.view === 'catalog'){
    main.innerHTML = renderCatalogView();
  } else {
    const proj = currentProject();
    main.innerHTML = proj ? renderProjectView(proj) : renderEmptyState();
  }
  attachHandlers();
}

function renderSidebar(){
  const list = document.getElementById('projList');
  if(state.projects.length===0){
    list.innerHTML = '<div style="color:#8FA0A8;font-size:12px;padding:8px 10px;">Пока нет проектов</div>';
    return;
  }
  list.innerHTML = state.projects.map(p=>`
    <div class="proj-item ${p.id===state.currentProjectId && state.view==='project' ? 'active':''}" data-open="${p.id}">
      <span>${escapeHtml(p.name || 'Без названия')}</span>
      <span class="del" data-del="${p.id}" title="Удалить проект">✕</span>
    </div>
  `).join('');
}

function renderEmptyState(){
  return `
    <div class="empty-state">
      <h1>Расчёт сметы ремонта</h1>
      <p>Создайте новый проект, добавьте помещения с их размерами и выберите виды работ — смета соберётся автоматически.</p>
      <button class="btn btn-primary" id="emptyNewProject" style="margin-top:16px;">+ Новый проект</button>
    </div>
  `;
}

function renderProjectView(proj){
  const roomsHtml = proj.rooms.map(r=>renderRoom(r)).join('');
  const grandTotal = proj.rooms.reduce((sum, r)=>{
    return sum + (r.works||[]).reduce((s2, rw)=>{
      const work = state.catalog.find(w=>w.id===rw.workId);
      if(!work) return s2;
      return s2 + calcWorkLine(r, rw, work).sum;
    }, 0);
  }, 0);

  return `
    <div class="proj-header">
      <div>
        <input class="proj-title-input" id="projName" value="${escapeAttr(proj.name)}" placeholder="Название проекта">
        <div class="proj-meta">${proj.rooms.length} помещ. · создан ${new Date(proj.createdAt).toLocaleDateString('ru-RU')}</div>
      </div>
      <div class="header-actions no-print">
        <button class="btn btn-outline" id="duplicateProject">Дублировать</button>
        <button class="btn btn-outline" id="exportProject">Печать / PDF</button>
      </div>
    </div>

    ${roomsHtml}
    <button class="add-room-btn no-print" id="addRoom">+ Добавить помещение</button>

    <div class="smeta-wrap" style="margin-top:32px;">
      <div class="smeta-head"><h2>Итоговая смета</h2></div>
      ${renderSmetaTable(proj)}
      <div class="smeta-total">
        <span class="label">Итого по проекту</span>
        <span class="value">${fmtMoney(grandTotal)}</span>
      </div>
    </div>
  `;
}

function renderRoom(room){
  const g = calcRoomGeometry(room);
  const worksHtml = state.catalog.map(work=>{
    const rw = (room.works||[]).find(w=>w.workId===work.id);
    const checked = !!rw;
    const line = checked ? calcWorkLine(room, rw, work) : {qty:0,sum:0};
    const manual = work.unit==='pcs' || work.unit==='m3';
    return `
      <div class="work-row ${checked?'checked':''}">
        <input type="checkbox" data-toggle-work="${room.id}|${work.id}" ${checked?'checked':''}>
        <span class="wname">${escapeHtml(work.name)}</span>
        <span class="wmeta">${fmtMoney(work.price)}/${UNIT_LABEL[work.unit]} · ${APPLIES_LABEL[work.appliesTo]}</span>
        ${checked && manual ? `<input class="manual-qty" type="number" min="0" step="0.01" placeholder="${work.unit==='pcs'?'кол-во':'м³'}" value="${rw.manualQty||''}" data-manual-qty="${room.id}|${work.id}">` : ''}
        ${checked ? `<span class="wsum">${fmt(line.qty)} ${UNIT_LABEL[work.unit]} · ${fmtMoney(line.sum)}</span>` : `<span class="wsum" style="color:#B7BEC2;">—</span>`}
      </div>
    `;
  }).join('');

  return `
    <div class="room" data-room="${room.id}">
      <div class="room-head">
        <input class="room-name" value="${escapeAttr(room.name)}" data-room-name="${room.id}" placeholder="Название помещения">
        <span class="room-tag no-print">${state.catalog.length ? '' : ''}</span>
        <button class="btn-icon no-print" data-del-room="${room.id}" title="Удалить помещение">✕</button>
      </div>
      <div class="room-body">
        <div class="dims-row">
          <div class="dim">
            <label>Длина <span class="unit">(м)</span></label>
            <input type="number" min="0" step="0.01" value="${room.length}" data-dim="${room.id}|length">
          </div>
          <div class="dim">
            <label>Ширина <span class="unit">(м)</span></label>
            <input type="number" min="0" step="0.01" value="${room.width}" data-dim="${room.id}|width">
          </div>
          <div class="dim">
            <label>Высота <span class="unit">(м)</span></label>
            <input type="number" min="0" step="0.01" value="${room.height}" data-dim="${room.id}|height">
          </div>
        </div>

        <div class="subsection">
          <div class="subsection-title">Окна</div>
          ${(room.windows||[]).map((o,i)=>renderOpeningRow(room.id,'windows',i,o)).join('')}
          <button class="add-link" data-add-opening="${room.id}|windows">+ добавить окно</button>
        </div>

        <div class="subsection">
          <div class="subsection-title">Двери</div>
          ${(room.doors||[]).map((o,i)=>renderOpeningRow(room.id,'doors',i,o)).join('')}
          <button class="add-link" data-add-opening="${room.id}|doors">+ добавить дверь</button>
        </div>

        <div class="subsection">
          <div class="subsection-title">Виды работ</div>
          <div class="work-list">${worksHtml}</div>
        </div>

        <div class="room-summary">
          <div class="badge">Периметр: <b>${fmt(g.perimeter)} м.п.</b></div>
          <div class="badge">Площадь стен (с вычетом проёмов): <b>${fmt(g.wallArea)} м²</b></div>
          <div class="badge">Площадь пола: <b>${fmt(g.floorArea)} м²</b></div>
          <div class="badge">Площадь потолка: <b>${fmt(g.ceilingArea)} м²</b></div>
        </div>
      </div>
    </div>
  `;
}

function renderOpeningRow(roomId, kind, idx, o){
  return `
    <div class="opening-row">
      <span>${kind==='windows'?'окно':'дверь'} ${idx+1}</span>
      <input type="number" min="0" step="0.01" placeholder="ширина" value="${o.w}" data-opening="${roomId}|${kind}|${idx}|w">
      <input type="number" min="0" step="0.01" placeholder="высота" value="${o.h}" data-opening="${roomId}|${kind}|${idx}|h">
      <input type="number" min="1" step="1" placeholder="кол-во" value="${o.qty}" data-opening="${roomId}|${kind}|${idx}|qty">
      <button class="btn-icon" data-del-opening="${roomId}|${kind}|${idx}" title="Удалить">✕</button>
    </div>
  `;
}

function renderSmetaTable(proj){
  const rowsHtml = [];
  let hasAny = false;
  proj.rooms.forEach(room=>{
    const roomWorks = (room.works||[]).map(rw=>{
      const work = state.catalog.find(w=>w.id===rw.workId);
      if(!work) return null;
      const line = calcWorkLine(room, rw, work);
      if(line.qty<=0) return null;
      return {work, line};
    }).filter(Boolean);
    if(roomWorks.length===0) return;
    hasAny = true;
    rowsHtml.push(`<tr class="room-divider"><td colspan="5">${escapeHtml(room.name)}</td></tr>`);
    roomWorks.forEach(({work,line})=>{
      rowsHtml.push(`
        <tr>
          <td>${escapeHtml(work.name)}</td>
          <td class="num">${UNIT_LABEL[work.unit]}</td>
          <td class="num">${fmt(line.qty)}</td>
          <td class="num">${fmtMoney(work.price)}</td>
          <td class="num"><b>${fmtMoney(line.sum)}</b></td>
        </tr>
      `);
    });
  });
  if(!hasAny){
    return `<div class="empty-hint">Добавьте помещения и отметьте виды работ — позиции появятся здесь.</div>`;
  }
  return `
    <table class="smeta">
      <thead><tr><th>Вид работ</th><th>Ед.</th><th>Кол-во</th><th>Цена</th><th>Сумма</th></tr></thead>
      <tbody>${rowsHtml.join('')}</tbody>
    </table>
  `;
}

function renderCatalogView(){
  const rows = state.catalog.map(w=>`
    <tr data-work-row="${w.id}">
      <td><input type="text" value="${escapeAttr(w.name)}" data-cat-field="${w.id}|name"></td>
      <td>
        <select data-cat-field="${w.id}|unit">
          <option value="m2" ${w.unit==='m2'?'selected':''}>м² (площадь)</option>
          <option value="ml" ${w.unit==='ml'?'selected':''}>м.п. (погонный метр)</option>
          <option value="m3" ${w.unit==='m3'?'selected':''}>м³ (объём)</option>
          <option value="pcs" ${w.unit==='pcs'?'selected':''}>шт. (количество)</option>
        </select>
      </td>
      <td>
        <select data-cat-field="${w.id}|appliesTo">
          <option value="walls" ${w.appliesTo==='walls'?'selected':''}>стены</option>
          <option value="floor" ${w.appliesTo==='floor'?'selected':''}>пол</option>
          <option value="ceiling" ${w.appliesTo==='ceiling'?'selected':''}>потолок</option>
          <option value="perimeter" ${w.appliesTo==='perimeter'?'selected':''}>периметр</option>
          <option value="manual" ${w.appliesTo==='manual'?'selected':''}>вручную</option>
        </select>
      </td>
      <td><input type="number" min="0" step="1" value="${w.price}" data-cat-field="${w.id}|price"></td>
      <td><button class="btn-icon" data-del-work="${w.id}" title="Удалить">✕</button></td>
    </tr>
  `).join('');

  return `
    <div class="proj-header">
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;">Виды работ</div>
        <div class="proj-meta">справочник для расчёта смет · ${state.catalog.length} позиций</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="addWork">+ Добавить вид работ</button>
      </div>
    </div>
    <table class="catalog-table">
      <thead><tr><th>Название</th><th>Единица</th><th>Применяется к</th><th>Цена, ₽</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ---------- HANDLERS ----------
function attachHandlers(){
  const main = document.getElementById('main');
  const list = document.getElementById('projList');

  document.getElementById('newProjectBtn').onclick = createProject;
  document.getElementById('catalogBtn').onclick = ()=>{ state.view='catalog'; render(); };

  list.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-del]')) return;
      state.currentProjectId = el.getAttribute('data-open');
      state.view = 'project';
      render();
    });
  });
  list.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-del');
      if(confirm('Удалить проект без возможности восстановления?')){
        state.projects = state.projects.filter(p=>p.id!==id);
        if(state.currentProjectId===id) state.currentProjectId = state.projects[0]?.id || null;
        scheduleSave(); render();
      }
    });
  });

  const emptyBtn = document.getElementById('emptyNewProject');
  if(emptyBtn) emptyBtn.onclick = createProject;

  if(state.view==='catalog'){
    document.getElementById('addWork').onclick = ()=>{
      state.catalog.push({id:uid('w'), name:'Новый вид работ', unit:'m2', price:0, appliesTo:'walls'});
      scheduleSave(); render();
    };
    main.querySelectorAll('[data-del-work]').forEach(el=>{
      el.onclick = ()=>{
        const id = el.getAttribute('data-del-work');
        state.catalog = state.catalog.filter(w=>w.id!==id);
        scheduleSave(); render();
      };
    });
    main.querySelectorAll('[data-cat-field]').forEach(el=>{
      el.addEventListener('input', ()=>{
        const [id, field] = el.getAttribute('data-cat-field').split('|');
        const w = state.catalog.find(x=>x.id===id);
        if(!w) return;
        w[field] = field==='price' ? el.value : el.value;
        scheduleSave();
        if(field!=='name' && field!=='price'){ render(); } // unit/appliesTo change affects other rows minimally
      });
      el.addEventListener('change', ()=>{
        const [id, field] = el.getAttribute('data-cat-field').split('|');
        if(field==='unit' || field==='appliesTo'){ scheduleSave(); render(); }
      });
    });
    return;
  }

  const proj = currentProject();
  if(!proj) return;

  document.getElementById('projName').addEventListener('input', (e)=>{
    proj.name = e.target.value; scheduleSave(); renderSidebar();
    document.querySelectorAll('.proj-meta')[0] && (document.querySelectorAll('.proj-meta')[0].textContent = `${proj.rooms.length} помещ. · создан ${new Date(proj.createdAt).toLocaleDateString('ru-RU')}`);
  });
  document.getElementById('duplicateProject').onclick = ()=>{
    const copy = JSON.parse(JSON.stringify(proj));
    copy.id = uid('p'); copy.name = proj.name + ' (копия)'; copy.createdAt = Date.now();
    copy.rooms.forEach(r=>r.id = uid('r'));
    state.projects.push(copy);
    state.currentProjectId = copy.id;
    scheduleSave(); render();
  };
  document.getElementById('exportProject').onclick = ()=>window.print();
  document.getElementById('addRoom').onclick = ()=>{
    proj.rooms.push(emptyRoom());
    scheduleSave(); render();
  };

  main.querySelectorAll('[data-del-room]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute('data-del-room');
      if(proj.rooms.length<=1){ alert('В проекте должно остаться хотя бы одно помещение.'); return; }
      proj.rooms = proj.rooms.filter(r=>r.id!==id);
      scheduleSave(); render();
    };
  });

  main.querySelectorAll('[data-room-name]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const id = el.getAttribute('data-room-name');
      const r = proj.rooms.find(x=>x.id===id);
      if(r){ r.name = el.value; scheduleSave(); }
    });
  });

  main.querySelectorAll('[data-dim]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, field] = el.getAttribute('data-dim').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[field] = el.value; scheduleSave(); render(); }
    });
  });

  main.querySelectorAll('[data-add-opening]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, kind] = el.getAttribute('data-add-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind] = r[kind]||[]; r[kind].push({w:'', h:'', qty:1}); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-del-opening]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, kind, idx] = el.getAttribute('data-del-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind].splice(parseInt(idx),1); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-opening]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, kind, idx, field] = el.getAttribute('data-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind][parseInt(idx)][field] = el.value; scheduleSave(); render(); }
    });
  });

  main.querySelectorAll('[data-toggle-work]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const [roomId, workId] = el.getAttribute('data-toggle-work').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r) return;
      r.works = r.works||[];
      if(el.checked){
        if(!r.works.find(w=>w.workId===workId)) r.works.push({workId, manualQty:''});
      } else {
        r.works = r.works.filter(w=>w.workId!==workId);
      }
      scheduleSave(); render();
    });
  });
  main.querySelectorAll('[data-manual-qty]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, workId] = el.getAttribute('data-manual-qty').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r) return;
      const rw = r.works.find(w=>w.workId===workId);
      if(rw){ rw.manualQty = el.value; scheduleSave(); render(); }
    });
  });
}

function createProject(){
  const p = emptyProject();
  state.projects.push(p);
  state.currentProjectId = p.id;
  state.view = 'project';
  scheduleSave(); render();
}

function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

// запуск приложения
bootstrap();
</script>
