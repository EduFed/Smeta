}

function renderCatalogView(){
  const rows = state.catalog.map(w=>`
    <tr data-work-row="${w.id}">
      <td><input type="text" value="${escapeAttr(w.name)}" placeholder="Название работы" data-cat-field="${w.id}|name"></td>
      <td>
        <select data-cat-field="${w.id}|unit">
          <option value="m2" ${w.unit==='m2'?'selected':''}>м² (площадь)</option>
          <option value="ml" ${w.unit==='ml'?'selected':''}>м.п. (погонный метр)</option>
          <option value="m3" ${w.unit==='m3'?'selected':''}>м³ (объём)</option>
          <option value="pcs" ${w.unit==='pcs'?'selected':''}>шт. (количество)</option>
        </select>
      </td>
      <td>
        <select data-cat-field="${w.id}|appliesTo">
          <option value="walls" ${w.appliesTo==='walls'?'selected':''}>стены</option>
          <option value="floor" ${w.appliesTo==='floor'?'selected':''}>пол</option>
          <option value="ceiling" ${w.appliesTo==='ceiling'?'selected':''}>потолок</option>
          <option value="perimeter" ${w.appliesTo==='perimeter'?'selected':''}>периметр</option>
          <option value="manual" ${w.appliesTo==='manual'?'selected':''}>вручную</option>
        </select>
      </td>
      <td><input type="text" inputmode="decimal" value="${escapeAttr(w.price)}" data-cat-field="${w.id}|price"></td>
      <td><button class="btn-icon" data-del-work="${w.id}" title="Удалить">✕</button></td>
    </tr>
  `).join('');

  return `
    <div class="proj-header">
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;">Виды работ</div>
        <div class="proj-meta">справочник для расчёта смет · ${state.catalog.length} позиций</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" data-go="settings">← Настройки</button>
        <button class="btn btn-primary" id="addWork">+ Добавить вид работ</button>
      </div>
    </div>
    <table class="catalog-table">
      <thead><tr><th>Название</th><th>Единица</th><th>Применяется к</th><th>Цена, ₽</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ---------- HANDLERS ----------
function attachHandlers(){
  const main = document.getElementById('main');
  const list = document.getElementById('projList');

  document.getElementById('newProjectBtn').onclick = createProject;
  document.getElementById('settingsBtn').onclick = ()=>{ state.view='settings'; render(); };

  document.querySelectorAll('[data-go]').forEach(el=>{
    el.onclick = ()=>{ state.view = el.getAttribute('data-go'); render(); };
  });
  document.querySelectorAll('[data-exec]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const key = el.getAttribute('data-exec');
      state.executor = state.executor || {};
      state.executor[key] = el.value;
      const errBox = document.querySelector(`[data-exec-err="${key}"]`);
      if(errBox) errBox.textContent = validateCustomer(key, el.value);
      scheduleSave();
    });
  });

  list.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-del]')) return;
      state.currentProjectId = el.getAttribute('data-open');
      state.view = 'project';
      render();
    });
  });
  list.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-del');
      if(confirm('Удалить проект без возможности восстановления?')){
        state.projects = state.projects.filter(p=>p.id!==id);
        if(state.currentProjectId===id) state.currentProjectId = state.projects[0]?.id || null;
        scheduleSave(); render();
      }
    });
  });

  const emptyBtn = document.getElementById('emptyNewProject');
  if(emptyBtn) emptyBtn.onclick = createProject;

  if(state.view==='catalog'){
    document.getElementById('addWork').onclick = ()=>{
      const w = {id:uid('w'), name:'', unit:'m2', price:'', appliesTo:'walls'};
      state.catalog.push(w);
      scheduleSave(); render();
      const inp = document.querySelector(`[data-cat-field="${w.id}|name"]`);
      if(inp){ inp.scrollIntoView({block:'center', behavior:'smooth'}); inp.focus(); }
    };
    main.querySelectorAll('[data-del-work]').forEach(el=>{
      el.onclick = ()=>{
        const id = el.getAttribute('data-del-work');
        state.catalog = state.catalog.filter(w=>w.id!==id);
        scheduleSave(); render();
      };
    });
    main.querySelectorAll('[data-cat-field]').forEach(el=>{
      el.addEventListener('input', ()=>{
        const [id, field] = el.getAttribute('data-cat-field').split('|');
        const w = state.catalog.find(x=>x.id===id);
        if(!w) return;
        w[field] = field==='price' ? el.value : el.value;
        scheduleSave();
        if(field!=='name' && field!=='price'){ render(); } // unit/appliesTo change affects other rows minimally
      });
      el.addEventListener('change', ()=>{
        const [id, field] = el.getAttribute('data-cat-field').split('|');
        if(field==='unit' || field==='appliesTo'){ scheduleSave(); render(); }
      });
    });
    return;
  }

  const proj = currentProject();
  if(!proj) return;

  document.getElementById('projName').addEventListener('input', (e)=>{
    proj.name = e.target.value; scheduleSave(); renderSidebar();
    document.querySelectorAll('.proj-meta')[0] && (document.querySelectorAll('.proj-meta')[0].textContent = `${proj.rooms.length} помещ. · создан ${new Date(proj.createdAt).toLocaleDateString('ru-RU')}`);
  });
  document.getElementById('duplicateProject').onclick = ()=>{
    const copy = JSON.parse(JSON.stringify(proj));
    copy.id = uid('p'); copy.name = proj.name + ' (копия)'; copy.createdAt = Date.now();
    copy.rooms.forEach(r=>r.id = uid('r'));
    state.projects.push(copy);
    state.currentProjectId = copy.id;
    scheduleSave(); render();
  };
  document.getElementById('exportProject').onclick = ()=>window.print();
  document.getElementById('addRoom').onclick = ()=>{
    proj.rooms.push(emptyRoom());
    scheduleSave(); render();
  };

  main.querySelectorAll('[data-del-room]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute('data-del-room');
      if(proj.rooms.length<=1){ alert('В проекте должно остаться хотя бы одно помещение.'); return; }
      proj.rooms = proj.rooms.filter(r=>r.id!==id);
      scheduleSave(); render();
    };
  });

  main.querySelectorAll('[data-room-name]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const id = el.getAttribute('data-room-name');
      const r = proj.rooms.find(x=>x.id===id);
      if(r){ r.name = el.value; scheduleSave(); }
    });
  });

  main.querySelectorAll('[data-dim]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, field] = el.getAttribute('data-dim').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[field] = el.value; scheduleSave(); updateDerived(proj); }
    });
  });

  main.querySelectorAll('[data-add-opening]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, kind] = el.getAttribute('data-add-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind] = r[kind]||[]; r[kind].push({w:'', h:'', qty:''}); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-del-opening]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, kind, idx] = el.getAttribute('data-del-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind].splice(parseInt(idx),1); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-opening]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, kind, idx, field] = el.getAttribute('data-opening').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r[kind][parseInt(idx)][field] = el.value; scheduleSave(); updateDerived(proj); }
    });
  });

  // --- Документы ---
  main.querySelectorAll('[data-panel]').forEach(el=>{
    el.onclick = ()=>{
      const name = el.getAttribute('data-panel');
      uiPanel[name] = !uiPanel[name];
      const box = main.querySelector(`[data-panel-box="${name}"]`);
      if(box) box.classList.toggle('open', uiPanel[name]);
    };
  });
  const ct = main.querySelector('[data-contract-type]');
  if(ct) ct.addEventListener('change', ()=>{ uiContractType = ct.value; render(); });
  const cd = main.querySelector('[data-contract-days]');
  if(cd) cd.addEventListener('input', ()=>{ uiContractDays = cd.value; });
  const cdt = main.querySelector('[data-contract-date]');
  if(cdt) cdt.addEventListener('input', ()=>{ uiContractDate = cdt.value; });
  const sett = main.querySelector('[data-settlement]');
  if(sett) sett.addEventListener('input', ()=>{ uiSettlementAmount = sett.value; });

  main.querySelectorAll('[data-add-extra]').forEach(el=>{
    el.onclick = ()=>{
      proj.extraWorks = proj.extraWorks || [];
      proj.extraWorks.push({ name:'', unit:'pcs', qty:'', price:'' });
      scheduleSave(); render();
    };
  });
  main.querySelectorAll('[data-del-extra]').forEach(el=>{
    el.onclick = ()=>{
      const i = parseInt(el.getAttribute('data-del-extra'));
      if(proj.extraWorks){ proj.extraWorks.splice(i,1); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-extra]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [idx, field] = el.getAttribute('data-extra').split('|');
      const e = (proj.extraWorks||[])[idx];
      if(!e) return;
      e[field] = el.value;
      const sumEl = main.querySelector(`[data-extra-sum="${idx}"]`);
      if(sumEl) sumEl.textContent = fmtMoney(num(e.qty)*num(e.price));
      scheduleSave(); updateDerived(proj);
    });
  });

  main.querySelectorAll('[data-doc]').forEach(el=>{
    el.onclick = ()=>{
      const [docType, format, action] = el.getAttribute('data-doc').split('|');
      let previewWin = null;
      if(action === 'preview'){
        previewWin = window.open('', '_blank');
        if(previewWin) previewWin.document.write('<!doctype html><meta charset="utf-8"><p style="font-family:sans-serif;padding:24px;color:#555">Формирование документа…</p>');
      }
      generateDoc(proj, docType, format, action, el, previewWin);
    };
  });

  // --- Данные для договора ---
  main.querySelectorAll('[data-cust-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const pid = el.getAttribute('data-cust-toggle');
      const open = !uiCustomerOpen[pid];
      uiCustomerOpen[pid] = open;
      const box = main.querySelector(`[data-cust-acc="${pid}"]`);
      if(box) box.classList.toggle('open', open);
      el.setAttribute('aria-expanded', open);
    });
  });
  main.querySelectorAll('[data-cust]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [pid, key] = el.getAttribute('data-cust').split('|');
      if(pid !== proj.id) return;
      proj.customer = proj.customer || {};
      proj.customer[key] = el.value;
      const errBox = main.querySelector(`[data-cust-err="${pid}|${key}"]`);
      if(errBox) errBox.textContent = validateCustomer(key, el.value);
      if(key === 'advance'){
        const w = main.querySelector(`[data-cust-adv-words="${pid}"]`);
        if(w) w.textContent = el.value ? rublesToWords(num(el.value)) : '';
      }
      scheduleSave();
    });
  });

  // --- Форма помещения (режим размеров) ---
  main.querySelectorAll('[data-room-shape]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const roomId = el.getAttribute('data-room-shape');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r.shape = el.value; scheduleSave(); render(); }
    });
  });
  main.querySelectorAll('[data-shapedim]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, key] = el.getAttribute('data-shapedim').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r) return;
      r.dims = r.dims || {};
      r.dims[key] = el.value;
      const shape = r.shape || 'rect';
      const a = main.querySelector(`[data-dimarea="${roomId}"]`);
      const p = main.querySelector(`[data-dimperim="${roomId}"]`);
      const wn = main.querySelector(`[data-dimwarn="${roomId}"]`);
      if(a) a.textContent = fmt(shapeArea(shape, r.dims));
      if(p) p.textContent = fmt(shapePerimeter(shape, r.dims));
      if(wn){
        const cl = shapeClosure(shape, r.dims);
        wn.textContent = (cl > 0.05) ? `Контур не замыкается (расхождение ${fmt(cl)} м) — проверьте длины стен.` : '';
      }
      scheduleSave(); updateDerived(proj);
    });
  });

  // --- Участки пола ---
  main.querySelectorAll('[data-add-floor]').forEach(el=>{
    el.onclick = ()=>{
      const roomId = el.getAttribute('data-add-floor');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r.floorSections = r.floorSections||[]; r.floorSections.push({l:'', w:''}); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-del-floor]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, idx] = el.getAttribute('data-del-floor').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r && r.floorSections){ r.floorSections.splice(parseInt(idx),1); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-floor]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, idx, field] = el.getAttribute('data-floor').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r || !r.floorSections || !r.floorSections[idx]) return;
      r.floorSections[idx][field] = el.value;
      const f = r.floorSections[idx];
      const areaEl = main.querySelector(`[data-floor-area="${roomId}|${idx}"]`);
      if(areaEl) areaEl.textContent = fmt(num(f.l)*num(f.w)) + ' м²';
      const totalEl = main.querySelector(`[data-floor-total="${roomId}"]`);
      if(totalEl) totalEl.textContent = fmt((r.floorSections||[]).reduce((s,x)=> s + num(x.l)*num(x.w), 0));
      scheduleSave(); updateDerived(proj);
    });
  });

  // --- Режим расчёта помещения ---
  main.querySelectorAll('[data-calc-mode]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, mode] = el.getAttribute('data-calc-mode').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r.calcMode = mode; scheduleSave(); render(); }
    };
  });

  // --- Стены ---
  main.querySelectorAll('[data-wall-shape]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const roomId = el.getAttribute('data-wall-shape');
      uiWallDraft[roomId] = { shape: el.value };
      render();
    });
  });
  main.querySelectorAll('[data-wall-draft]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, field] = el.getAttribute('data-wall-draft').split('|');
      const d = wallDraft(roomId);
      d[field] = el.value;
      const prev = main.querySelector(`[data-wall-preview="${roomId}"]`);
      if(prev) prev.textContent = fmt(computeWallArea(d));
      const err = main.querySelector(`[data-wall-error="${roomId}"]`);
      if(err) err.textContent = '';
    });
  });
  main.querySelectorAll('[data-add-wall]').forEach(el=>{
    el.onclick = ()=>{
      const roomId = el.getAttribute('data-add-wall');
      const r = proj.rooms.find(x=>x.id===roomId);
      const d = wallDraft(roomId);
      const area = computeWallArea(d);
      const err = main.querySelector(`[data-wall-error="${roomId}"]`);
      if(!r) return;
      if(!(area > 0)){ if(err) err.textContent = 'Заполните размеры стены (площадь должна быть больше 0).'; return; }
      r.walls = r.walls || [];
      r.walls.push({ ...d });
      uiWallDraft[roomId] = { shape: d.shape };
      scheduleSave(); render();
    };
  });
  main.querySelectorAll('[data-del-wall]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, idx] = el.getAttribute('data-del-wall').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r && r.walls){ r.walls.splice(parseInt(idx),1); scheduleSave(); render(); }
    };
  });

  main.querySelectorAll('[data-worksearch-input]').forEach(el=>{
    const roomId = el.getAttribute('data-worksearch-input');
    const box = main.querySelector(`[data-worksearch="${roomId}"]`);
    const filt = ()=>{
      uiWorkSearch[roomId] = el.value;
      const q = el.value.toLowerCase().trim();
      box.querySelectorAll('.wd-item').forEach(it=>{
        it.style.display = (!q || it.getAttribute('data-name').includes(q)) ? '' : 'none';
      });
    };
    el.addEventListener('focus', ()=>{ if(box) box.classList.add('open'); });
    el.addEventListener('input', filt);
    el.addEventListener('blur', ()=>{ setTimeout(()=>{ if(box) box.classList.remove('open'); }, 160); });
  });
  main.querySelectorAll('[data-add-work-item]').forEach(el=>{
    el.addEventListener('mousedown', e=> e.preventDefault());
    el.addEventListener('click', ()=>{
      const [roomId, workId] = el.getAttribute('data-add-work-item').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r) return;
      r.works = r.works||[];
      if(!r.works.find(w=>w.workId===workId)) r.works.push({workId, manualQty:''});
      uiWorkSearchRefocus = roomId;
      scheduleSave(); render();
    });
  });
  main.querySelectorAll('[data-remove-work]').forEach(el=>{
    el.onclick = ()=>{
      const [roomId, workId] = el.getAttribute('data-remove-work').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(r){ r.works = (r.works||[]).filter(w=>w.workId!==workId); scheduleSave(); render(); }
    };
  });
  main.querySelectorAll('[data-manual-qty]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const [roomId, workId] = el.getAttribute('data-manual-qty').split('|');
      const r = proj.rooms.find(x=>x.id===roomId);
      if(!r) return;
      const rw = r.works.find(w=>w.workId===workId);
      if(rw){ rw.manualQty = el.value; scheduleSave(); updateDerived(proj); }
    });
  });
}

// Живой пересчёт итогов и площадей без перерисовки полей ввода
function updateDerived(proj){
  proj.rooms.forEach(room=>{
    const roomEl = document.querySelector(`.room[data-room="${room.id}"]`);
    if(!roomEl) return;
    const g = calcRoomGeometry(room);
    const setB = (k, txt)=>{ const b = roomEl.querySelector(`[data-out="${k}"]`); if(b) b.textContent = txt; };
    setB('perimeter', fmt(g.perimeter)+' м.п.');
    setB('wallArea', fmt(g.wallArea)+' м²');
    setB('floorArea', fmt(g.floorArea)+' м²');
    setB('ceilingArea', fmt(g.ceilingArea)+' м²');
    (room.works||[]).forEach(rw=>{
      const work = state.catalog.find(w=>w.id===rw.workId);
      if(!work) return;
      const line = calcWorkLine(room, rw, work);
      const span = roomEl.querySelector(`[data-wsum="${room.id}|${rw.workId}"]`);
      if(span) span.textContent = `${fmt(line.qty)} ${UNIT_LABEL[work.unit]} · ${fmtMoney(line.sum)}`;
    });
  });
  const sm = document.getElementById('smetaBlock');
  if(sm) sm.innerHTML = renderSmetaBlock(proj);
  // стоимость в блоке договора
  const total = projectTotal(proj);
  const ct = document.querySelector(`[data-cust-total="${proj.id}"]`);
  const ctw = document.querySelector(`[data-cust-total-words="${proj.id}"]`);
  if(ct) ct.textContent = fmtMoney(total);
  if(ctw) ctw.textContent = rublesToWords(total);
}

function createProject(){
  const p = emptyProject();
  state.projects.push(p);
  state.currentProjectId = p.id;
  state.view = 'project';
  scheduleSave(); render();
}

function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

// авто-тема по времени устройства: тёмная с 19:00 до 07:00
function applyTheme(){
  const h = new Date().getHours();
  const dark = (h >= 19 || h < 7);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}
applyTheme();
setInterval(applyTheme, 10 * 60 * 1000);

// запуск приложения
bootstrap();
</script>
